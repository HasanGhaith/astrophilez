<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore – Astrophiles</title>
  <link rel="icon" href="logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <link rel="stylesheet" href="/static/shell.css">
  <script src="/static/shell.js"></script>

  <style>
    /* ── ARENA BANNER ── */
    .arena-banner{
      display:flex;align-items:center;gap:1rem;
      background:linear-gradient(135deg,rgba(168,85,247,0.12),rgba(168,85,247,0.06));
      border:1px solid rgba(168,85,247,0.3);
      border-radius:14px;padding:0.9rem 1.1rem;margin:0.75rem 0 0.25rem;
      cursor:pointer;text-decoration:none;transition:all 0.22s;
    }
    .arena-banner:hover{border-color:rgba(168,85,247,0.6);box-shadow:0 0 24px rgba(168,85,247,0.2);transform:translateY(-1px);}
    .arena-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#a855f7,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
    .arena-text{flex:1;min-width:0;}
    .arena-title{font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:#d8b4fe;margin-bottom:1px;}
    .arena-sub{font-size:0.74rem;color:var(--muted);}
    .arena-cta{font-family:'Syne',sans-serif;font-size:0.72rem;font-weight:700;color:#a855f7;white-space:nowrap;display:flex;align-items:center;gap:3px;}
    .arena-cta svg{width:12px;height:12px;}

    /* ── FEED TABS ── */
    .feed-tabs{display:flex;border-bottom:1px solid var(--border);margin:0.25rem 0 0;}
    .feed-tab{flex:1;padding:0.65rem 0;text-align:center;font-size:0.88rem;font-weight:600;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all 0.2s;border-bottom:2px solid transparent;font-family:'DM Sans',sans-serif;}
    .feed-tab.active{color:var(--fg);border-bottom-color:var(--accent);}
    .feed-tab:hover:not(.active){color:var(--fg);}

    /* ── FILTERS ── */
    .filters-wrap{margin:0.6rem 0 0.25rem;}
    .filters-toggle{display:flex;align-items:center;gap:5px;background:rgba(12,18,32,0.5);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:0.72rem;color:var(--muted);cursor:pointer;width:fit-content;transition:all 0.2s;user-select:none;}
    .filters-toggle:hover{color:var(--fg);}
    .filters-toggle svg{width:11px;height:11px;transition:transform 0.2s;}
    .filters-toggle.open svg:last-child{transform:rotate(180deg);}
    .filters-active-badge{background:var(--accent-dim);border:1px solid rgba(243,209,59,0.3);color:var(--accent);border-radius:5px;padding:1px 5px;font-size:0.65rem;font-weight:600;}
    .filters-panel{display:none;background:rgba(12,18,32,0.7);border:1px solid var(--border);border-radius:10px;padding:0.75rem;margin-top:5px;}
    .filters-panel.open{display:block;}
    .filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
    .filter-row:last-child{margin-bottom:0;}
    .filter-row-label{font-size:0.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
    .filter-chip{padding:3px 9px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.72rem;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
    .filter-chip.active{background:var(--accent-dim);border-color:rgba(243,209,59,0.4);color:var(--accent);}
    .filter-chip:hover:not(.active){color:var(--fg);}

    /* ── PROBLEM CARD ── */
    .problem-card{background:var(--card);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:18px;margin-bottom:1rem;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;animation:cardIn 0.4s cubic-bezier(0.16,1,0.3,1) both;cursor:pointer;}
    .problem-card:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4);border-color:rgba(243,209,59,0.15);}
    @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .card-header{padding:0.9rem 1.2rem 0.6rem;display:flex;align-items:center;justify-content:space-between;}
    .card-author{display:flex;align-items:center;gap:10px;cursor:pointer;}
    .card-author:hover .author-name{color:var(--accent);}
    .author-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#1a2540,#0c1220);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.75rem;color:var(--accent);}
    .author-name{font-size:0.83rem;font-weight:600;transition:color 0.15s;}
    .author-handle{font-size:0.7rem;color:var(--muted);}
    .card-badges{display:flex;align-items:center;gap:5px;}
    .badge{padding:2px 7px;border-radius:5px;font-size:0.68rem;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;}
    .badge-topic{background:rgba(0,229,255,0.09);color:var(--cyan);border:1px solid rgba(0,229,255,0.18);}
    .badge-diff-1,.badge-diff-2{background:rgba(46,213,115,0.09);color:#2ed573;border:1px solid rgba(46,213,115,0.18);}
    .badge-diff-3{background:rgba(243,209,59,0.09);color:var(--accent);border:1px solid rgba(243,209,59,0.18);}
    .badge-diff-4{background:rgba(255,165,2,0.09);color:#ffa502;border:1px solid rgba(255,165,2,0.18);}
    .badge-diff-5{background:rgba(255,71,87,0.09);color:var(--error);border:1px solid rgba(255,71,87,0.18);}
    .card-problem{padding:0.1rem 1.2rem 0.9rem;border-bottom:1px solid var(--border);}
    .math-display{background:rgba(5,8,15,0.5);border:1px solid var(--border);border-radius:10px;padding:0.8rem 1rem;overflow-x:auto;text-align:center;font-size:1rem;}
    .card-footer{padding:0.6rem 1.2rem;display:flex;align-items:center;justify-content:space-between;}
    .card-stats{display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;}
    .stat-pill{display:flex;align-items:center;gap:3px;font-size:0.72rem;color:var(--muted);}
    .stat-pill svg{width:11px;height:11px;flex-shrink:0;}
    .card-actions{display:flex;align-items:center;gap:6px;}
    .action-btn{display:flex;align-items:center;gap:4px;padding:0.3rem 0.65rem;border-radius:7px;border:1px solid var(--border);background:transparent;font-size:0.74rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all 0.15s;}
    .action-btn svg{width:12px;height:12px;}
    .action-btn:hover{color:var(--fg);}
    .action-btn.upvoted{color:var(--accent);border-color:rgba(243,209,59,0.4);background:var(--accent-dim);}
    .action-btn.solved{color:var(--success);border-color:rgba(46,213,115,0.3);background:rgba(46,213,115,0.06);cursor:default;}
    .btn-solve{padding:0.3rem 0.8rem;border-radius:7px;background:linear-gradient(135deg,var(--accent),#d4851a);color:#05080f;font-size:0.74rem;font-weight:700;font-family:'Syne',sans-serif;border:none;cursor:pointer;transition:all 0.18s;}
    .btn-solve:hover{transform:translateY(-1px);box-shadow:0 4px 12px var(--accent-glow);}

    /* ── LEADERBOARD + SEARCH ── */
    .lb-page{display:none;}
    .lb-page.active{display:block;}
    .page-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;padding:1.25rem 0 0.75rem;display:flex;align-items:center;gap:8px;}
    .search-input-wrap{position:relative;margin-bottom:1rem;}
    .search-input{width:100%;padding:0.75rem 1rem 0.75rem 2.5rem;background:rgba(12,18,32,0.7);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    .search-input:focus{border-color:rgba(243,209,59,0.4);box-shadow:0 0 0 3px rgba(243,209,59,0.07);}
    .search-input::placeholder{color:var(--muted);}
    .search-input-icon{position:absolute;left:0.85rem;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);pointer-events:none;}
    .lb-top-section{margin-bottom:1.25rem;}
    .lb-section-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.6rem;display:flex;align-items:center;gap:5px;}
    .lb-full-row{display:flex;align-items:center;gap:12px;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:0.5rem;cursor:pointer;transition:all 0.18s;animation:cardIn 0.3s cubic-bezier(0.16,1,0.3,1) both;}
    .lb-full-row:hover{border-color:rgba(243,209,59,0.2);transform:translateY(-1px);}
    .lb-full-rank{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;width:28px;text-align:center;flex-shrink:0;color:var(--muted);}
    .lb-full-rank.gold{color:#f3d13b;}.lb-full-rank.silver{color:#b0b8c8;}.lb-full-rank.bronze{color:#cd7f32;}
    .lb-full-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a2540,#0c1220);border:1px solid rgba(243,209,59,0.2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:var(--accent);flex-shrink:0;}
    .lb-full-info{flex:1;min-width:0;}
    .lb-full-name{font-size:0.88rem;font-weight:600;display:flex;align-items:center;gap:5px;}
    .lb-full-sub{font-size:0.72rem;color:var(--muted);}
    .lb-full-pts{font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:var(--accent);white-space:nowrap;}
    .lb-pos-change{font-size:0.7rem;font-weight:700;margin-left:4px;white-space:nowrap;}
    .lb-pos-change.up{color:var(--success);}.lb-pos-change.down{color:var(--error);}
    .user-result-card{display:flex;align-items:center;gap:12px;padding:0.75rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:0.5rem;cursor:pointer;transition:all 0.18s;animation:cardIn 0.3s cubic-bezier(0.16,1,0.3,1) both;}
    .user-result-card:hover{border-color:rgba(243,209,59,0.25);transform:translateY(-1px);}
    .user-result-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1a2540,#0c1220);border:1px solid rgba(243,209,59,0.2);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;color:var(--accent);flex-shrink:0;}
    .user-result-info{flex:1;min-width:0;}
    .user-result-name{font-size:0.9rem;font-weight:600;}
    .user-result-handle{font-size:0.75rem;color:var(--muted);}
    .user-result-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;}
    .user-result-sub .val{color:var(--accent);font-weight:600;}

    /* ── LIVE INDICATOR ── */
    .live-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:700;color:var(--success);text-transform:uppercase;letter-spacing:0.06em;padding:2px 8px;border-radius:20px;background:rgba(46,213,115,0.08);border:1px solid rgba(46,213,115,0.2);margin-left:auto;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:livePulse 1.5s ease-in-out infinite;}
    @keyframes livePulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}
    .lb-updated-flash{animation:flashHighlight 0.6s ease-out;}
    @keyframes flashHighlight{0%{background:rgba(46,213,115,0.06);}100%{background:transparent;}}

    .sk-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:1rem;overflow:hidden;padding:1rem;}
    .sk{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:5px;}
    @keyframes shimmer{to{background-position:-200% 0}}

    .feed-empty{text-align:center;padding:3.5rem 1rem;color:var(--muted);}
    .feed-empty-icon{font-size:2.5rem;margin-bottom:0.75rem;opacity:0.5;}
    .feed-empty h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--fg);margin-bottom:0.3rem;}
    .feed-empty p{font-size:0.83rem;margin-bottom:1.25rem;}
    .btn-discover{display:inline-flex;align-items:center;gap:5px;padding:0.55rem 1.1rem;border-radius:9px;background:var(--accent-dim);border:1px solid rgba(243,209,59,0.3);color:var(--accent);font-size:0.82rem;font-weight:600;cursor:pointer;transition:all 0.2s;}

    .load-more-btn{width:100%;padding:0.75rem;border-radius:11px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:0.25rem;}
    .load-more-btn:hover{color:var(--fg);}
  </style>
</head>
<body>

<div class="app-shell">
  <div class="center-wrapper">
    <div class="main-content">
      <!-- shell.js injects mobile top-nav here -->

      <!-- ═══ EXPLORE PAGE ═══ -->
      <div id="page-explore">
        <a href="/math-arena.html" class="arena-banner">
          <div class="arena-icon">⚡</div>
          <div class="arena-text">
            <div class="arena-title">Math Arena</div>
            <div class="arena-sub">Real-time duels — challenge others and prove your rank</div>
          </div>
          <div class="arena-cta">Enter
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </a>

        <div class="feed-tabs">
          <button class="feed-tab active" id="tab-discover" onclick="switchTab('discover')">🌍 Discover</button>
          <button class="feed-tab" id="tab-friends" onclick="switchTab('friends')">👥 Following</button>
        </div>

        <div class="filters-wrap" id="filtersWrap">
          <div class="filters-toggle" id="filtersToggle" onclick="toggleFilters()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
            Filters
            <span class="filters-active-badge" id="activeFilterBadge" style="display:none;">•</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="filters-panel" id="filtersPanel">
            <div class="filter-row-label">Sort</div>
            <div class="filter-row" id="sortRow">
              <button class="filter-chip" onclick="setFilter('sort','trending',this)">🔥 Trending</button>
              <button class="filter-chip active" onclick="setFilter('sort','new',this)">✨ New</button>
              <button class="filter-chip" onclick="setFilter('sort','top',this)">⭐ Top</button>
            </div>
            <div class="filter-row-label" style="margin-top:8px;">Topic</div>
            <div class="filter-row" id="topicRow">
              <button class="filter-chip active" onclick="setFilter('topic','',this)">All</button>
              <button class="filter-chip" onclick="setFilter('topic','algebra',this)">Algebra</button>
              <button class="filter-chip" onclick="setFilter('topic','calculus',this)">Calculus</button>
              <button class="filter-chip" onclick="setFilter('topic','geometry',this)">Geometry</button>
              <button class="filter-chip" onclick="setFilter('topic','number_theory',this)">Number Theory</button>
              <button class="filter-chip" onclick="setFilter('topic','statistics',this)">Statistics</button>
            </div>
            <div class="filter-row-label" style="margin-top:8px;">Difficulty</div>
            <div class="filter-row" id="diffRow">
              <button class="filter-chip active" onclick="setFilter('diff','',this)">Any</button>
              <button class="filter-chip" onclick="setFilter('diff','1',this)">★ Easy</button>
              <button class="filter-chip" onclick="setFilter('diff','2',this)">★★</button>
              <button class="filter-chip" onclick="setFilter('diff','3',this)">★★★ Med</button>
              <button class="filter-chip" onclick="setFilter('diff','4',this)">★★★★ Hard</button>
              <button class="filter-chip" onclick="setFilter('diff','5',this)">★★★★★ Pro</button>
            </div>
          </div>
        </div>

        <div id="feed" style="margin-top:0.75rem;"></div>
        <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()" style="display:none;">Load more</button>
      </div>

      <!-- ═══ LEADERBOARD PAGE ═══ -->
      <div id="page-leaderboard" class="lb-page">
        <div class="page-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          Leaderboard
          <span class="live-badge" id="liveBadge" style="display:none;">
            <span class="live-dot"></span>Live
          </span>
        </div>
        <div class="search-input-wrap">
          <svg class="search-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="peopleSearchInput" type="text" placeholder="Search players…" oninput="debouncedSearch(this.value)" autocomplete="off"/>
        </div>
        <div id="lb-top-wrapper">
          <div class="lb-section-label">🏆 Top 10 Players</div>
          <div id="leaderboardList"></div>
        </div>
        <div id="searchResults" style="display:none;">
          <div class="lb-section-label">🔍 Search Results</div>
          <div id="searchResultsList"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
/* ── Navigate to profile ── */
function goToProfile(u) {
  if (!u) return;
  if (u._id)      window.location.href = '/profile?id='   + encodeURIComponent(u._id);
  else if (u.username) window.location.href = '/profile?name=' + encodeURIComponent(u.username.toLowerCase());
  else if (u.name)     window.location.href = '/profile?name=' + encodeURIComponent(u.name.toLowerCase());
}
function goToProfileById(id) {
  if (id && id !== 'undefined' && id !== '') window.location.href = '/profile?id=' + encodeURIComponent(id);
}

function displayName(u) { return u.displayName || u.username || u.name || '?'; }

/* ── Skeletons ── */
function skels(n) {
  return Array.from({ length: n }, function () {
    return '<div class="sk-card"><div style="display:flex;align-items:center;gap:9px;margin-bottom:0.9rem;"><div class="sk" style="width:32px;height:32px;border-radius:50%;flex-shrink:0;"></div><div style="flex:1;"><div class="sk" style="width:110px;height:12px;margin-bottom:5px;"></div><div class="sk" style="width:70px;height:10px;"></div></div></div><div class="sk" style="width:100%;height:58px;border-radius:10px;margin-bottom:0.9rem;"></div><div style="display:flex;justify-content:space-between;"><div class="sk" style="width:70px;height:26px;border-radius:7px;"></div><div class="sk" style="width:90px;height:26px;border-radius:7px;"></div></div></div>';
  }).join('');
}

/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
var allUsersCache = null, lbLoaded = false;
var state = { tab: 'discover', sort: 'new', topic: '', diff: '', page: 1, loading: false, exhausted: false };

/* ══════════════════════════════════════════
   PAGE SWITCHING
   ══════════════════════════════════════════ */
function activatePage(page) {
  document.getElementById('page-explore').style.display      = page === 'explore' ? 'block' : 'none';
  document.getElementById('page-leaderboard').classList.toggle('active', page === 'leaderboard');
  if (page === 'leaderboard') {
    setTimeout(function () { document.getElementById('peopleSearchInput').focus(); }, 100);
    loadLeaderboard();
    startLiveLeaderboard();
  } else {
    stopLiveLeaderboard();
  }
}

/* ══════════════════════════════════════════
   LIVE LEADERBOARD
   ══════════════════════════════════════════ */
var lbPollTimer = null, lbPrevPositions = {}, lbPrevHash = '';

function lbHash(users) {
  return users.map(function (u) { return (u._id || displayName(u)) + ':' + Shell.userElo(u); }).join('|');
}
function startLiveLeaderboard() {
  if (lbPollTimer) return;
  document.getElementById('liveBadge').style.display = 'inline-flex';
  lbPollTimer = setInterval(function () { pollLeaderboard(); }, 12000);
}
function stopLiveLeaderboard() {
  if (lbPollTimer) { clearInterval(lbPollTimer); lbPollTimer = null; }
  document.getElementById('liveBadge').style.display = 'none';
}
async function pollLeaderboard() {
  try {
    var r = await fetch('/api/leaderboard', { credentials: 'same-origin' });
    var d = await r.json(); if (!d.success) return;
    var top10 = d.users.slice(0, 10), newHash = lbHash(top10);
    if (newHash === lbPrevHash) return;
    lbPrevHash = newHash; allUsersCache = d.users;
    renderLeaderboard(top10, true);
  } catch (e) { console.error('[explore] pollLeaderboard:', e); }
}

/* ══════════════════════════════════════════
   LEADERBOARD + SEARCH
   ══════════════════════════════════════════ */
async function loadLeaderboard() {
  if (lbLoaded) return;
  var el = document.getElementById('leaderboardList');
  el.innerHTML = skels(3);
  try {
    var r = await fetch('/api/leaderboard', { credentials: 'same-origin' });
    var d = await r.json(); if (!d.success) throw new Error();
    lbLoaded = true; allUsersCache = d.users;
    lbPrevHash = lbHash(d.users.slice(0, 10));
    renderLeaderboard(d.users.slice(0, 10), false);
  } catch (e) { el.innerHTML = '<div class="feed-empty"><p>Failed to load.</p></div>'; }
}

function renderLeaderboard(users, isUpdate) {
  var el = document.getElementById('leaderboardList');
  var medals = ['🥇', '🥈', '🥉'];
  var rc = function (i) { return i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : ''; };
  var newPositions = {};
  users.forEach(function (u, i) { newPositions[u._id || displayName(u)] = i; });
  el.innerHTML = '';
  users.forEach(function (u, i) {
    var elo     = Shell.userElo(u);
    var name    = displayName(u);
    var country = (u.country || '').toUpperCase();
    var key     = u._id || name;
    var prevPos = lbPrevPositions[key];
    var delta   = (prevPos !== undefined) ? prevPos - i : 0;
    var changeHTML = '';
    if (isUpdate && delta > 0)       changeHTML = '<span class="lb-pos-change up">▲'   + delta           + '</span>';
    else if (isUpdate && delta < 0)  changeHTML = '<span class="lb-pos-change down">▼' + Math.abs(delta) + '</span>';
    var row = document.createElement('div');
    row.className = 'lb-full-row' + (isUpdate ? ' lb-updated-flash' : '');
    row.style.animationDelay = (i * 0.04) + 's';
    row.onclick = function () { goToProfile(u); };
    row.innerHTML =
      '<div class="lb-full-rank ' + rc(i) + '">' + (medals[i] || (i + 1)) + '</div>' +
      '<div class="lb-full-avatar">' + name[0].toUpperCase() + '</div>' +
      '<div class="lb-full-info">' +
        '<div class="lb-full-name">' + Shell.esc(name) + ' ' + (Shell.CMAP[country] || '') + '</div>' +
        '<div class="lb-full-sub">' + Shell.esc((u.username || '')) + changeHTML + '</div>' +
      '</div>' +
      '<div class="lb-full-pts">' + elo + ' Elo</div>';
    el.appendChild(row);
  });
  lbPrevPositions = newPositions;
}

var searchTimer = null;
function debouncedSearch(val) { clearTimeout(searchTimer); searchTimer = setTimeout(function () { doSearch(val); }, 250); }
function doSearch(q) {
  var wrap = document.getElementById('lb-top-wrapper');
  var res  = document.getElementById('searchResults');
  var list = document.getElementById('searchResultsList');
  if (!q.trim()) { wrap.style.display = 'block'; res.style.display = 'none'; return; }
  if (!allUsersCache) { loadLeaderboard().then(function () { doSearch(q); }); return; }
  var filtered = allUsersCache.filter(function (u) { return displayName(u).toLowerCase().includes(q.toLowerCase()); });
  wrap.style.display = 'none'; res.style.display = 'block';
  list.innerHTML = '';
  if (!filtered.length) { list.innerHTML = '<div class="feed-empty"><div class="feed-empty-icon">🔭</div><h3>No players found</h3></div>'; return; }
  filtered.forEach(function (u, i) {
    var elo     = Shell.userElo(u);
    var name    = displayName(u);
    var country = (u.country || '').toUpperCase();
    var card    = document.createElement('div');
    card.className = 'user-result-card';
    card.style.animationDelay = (i * 0.03) + 's';
    card.onclick = function () { goToProfile(u); };
    card.innerHTML =
      '<div class="user-result-avatar">' + name[0].toUpperCase() + '</div>' +
      '<div class="user-result-info">' +
        '<div class="user-result-name">' + Shell.esc(name) + ' ' + (Shell.CMAP[country] || '') + '</div>' +
        '<div class="user-result-handle">@' + Shell.esc((u.username || name).toLowerCase().replace(/\s+/g, '_')) + '</div>' +
        '<div class="user-result-sub">' + elo + ' Elo</div>' +
      '</div>' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" style="color:var(--muted);flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>';
    list.appendChild(card);
  });
}

/* ══════════════════════════════════════════
   TAB / FILTER
   ══════════════════════════════════════════ */
function switchTab(t) {
  state.tab = t;
  document.getElementById('tab-discover').classList.toggle('active', t === 'discover');
  document.getElementById('tab-friends').classList.toggle('active', t === 'friends');
  document.getElementById('filtersWrap').style.display = t === 'discover' ? 'block' : 'none';
  reset();
}
var filtersOpen = false;
function toggleFilters() {
  filtersOpen = !filtersOpen;
  document.getElementById('filtersPanel').classList.toggle('open', filtersOpen);
  document.getElementById('filtersToggle').classList.toggle('open', filtersOpen);
}
function setFilter(type, val, btn) {
  var rows = { sort: 'sortRow', topic: 'topicRow', diff: 'diffRow' };
  document.querySelectorAll('#' + rows[type] + ' .filter-chip').forEach(function (c) { c.classList.remove('active'); });
  btn.classList.add('active');
  state[type] = val;
  document.getElementById('activeFilterBadge').style.display = ((state.sort !== 'new') || state.topic || state.diff) ? 'inline' : 'none';
  reset();
}

/* ══════════════════════════════════════════
   FEED
   ══════════════════════════════════════════ */
function reset() {
  state.page = 1; state.exhausted = false;
  document.getElementById('feed').innerHTML = '';
  document.getElementById('loadMoreBtn').style.display = 'none';
  loadFeed(true);
}
async function loadFeed(initial) {
  if (state.loading || state.exhausted) return;
  state.loading = true;
  var feed = document.getElementById('feed');
  if (initial) feed.innerHTML = skels(3);
  try {
    var r, d;
    if (state.tab === 'friends') {
      r = await fetch('/api/explore/friends?page=' + state.page + '&limit=10', { credentials: 'same-origin' });
      d = await r.json();
      if (initial) feed.innerHTML = '';
      if (d.empty || !d.problems || !d.problems.length) {
        if (initial) feed.innerHTML = friendsEmpty();
        state.exhausted = true;
      } else { addCards(d.problems, feed, initial ? 0 : state.page * 10); paginate(d.pagination); }
    } else {
      var p = new URLSearchParams({ page: state.page, limit: 10, sort: state.sort });
      if (state.topic) p.set('topic', state.topic);
      if (state.diff)  p.set('difficulty', state.diff);
      r = await fetch('/challenges/explore?' + p, { credentials: 'same-origin' });
      if (!r.ok && r.status !== 401) throw new Error('Feed fetch failed: ' + r.status);
      d = await r.json();
      if (initial) feed.innerHTML = '';
      if (!d.problems || !d.problems.length) {
        if (initial) feed.innerHTML = discoverEmpty();
        state.exhausted = true;
      } else { addCards(d.problems, feed, initial ? 0 : state.page * 10); paginate(d.pagination); }
    }
  } catch (err) {
    if (initial) feed.innerHTML = '<div class="feed-empty"><p>Failed to load</p></div>';
    console.error('[explore] loadFeed:', err);
  } finally { state.loading = false; }
}
function loadMore() { state.page++; loadFeed(false); }
function paginate(pg) {
  state.page = pg.page;
  var has = pg.page < pg.pages;
  document.getElementById('loadMoreBtn').style.display = has ? 'block' : 'none';
  state.exhausted = !has;
}

/* ══════════════════════════════════════════
   PROBLEM CARDS
   ══════════════════════════════════════════ */
function addCards(problems, feed, startDelay) {
  problems.forEach(function (p, i) {
    var card = buildCard(p);
    card.style.animationDelay = ((i + (startDelay || 0)) * 0.04) + 's';
    feed.appendChild(card);
  });
  feed.querySelectorAll('.math-display:not(.rendered)').forEach(function (el) {
    el.classList.add('rendered');
    try { el.innerHTML = katex.renderToString(el.dataset.latex || '', { displayMode: true, throwOnError: false }); }
    catch (e) { el.textContent = el.dataset.latex || ''; }
  });
}

var DIFF_LABELS = { 1: 'Easy', 2: 'Fair', 3: 'Med', 4: 'Hard', 5: 'Pro' };

function relTime(date) {
  if (!date) return '';
  var s = Math.floor((Date.now() - new Date(date)) / 1000);
  if (s < 60)   return s + 's ago';
  if (s < 3600) return Math.floor(s / 60) + 'm ago';
  if (s < 86400) return Math.floor(s / 3600) + 'h ago';
  return Math.floor(s / 86400) + 'd ago';
}

function buildCard(p) {
  var creatorId   = p.creator_id   || '';
  var creatorName = p.creator_name || '?';
  var el = document.createElement('div');
  el.className = 'problem-card';
  el.dataset.id          = p._id;
  el.dataset.creatorId   = creatorId;
  el.dataset.creatorName = Shell.esc(creatorName);

  var initials   = creatorName[0].toUpperCase();
  var topicLabel = (p.topic || '').replace('_', ' ');
  var views      = +(p.view_count       || 0);
  var attempts   = +(p.total_attempts   || 0);
  var correct    = +(p.correct_attempts || 0);
  var accuracy   = attempts > 0 ? Math.round(correct / attempts * 100) : 0;

  var solvedBtn = p.user_solved
    ? '<button class="action-btn solved" onclick="event.stopPropagation()">✓ Solved</button>'
    : '<button class="btn-solve" onclick="event.stopPropagation();navigateToCard(\'' + p._id + '\')">Solve →</button>';

  el.innerHTML =
    '<div class="card-header">' +
      '<div class="card-author" onclick="event.stopPropagation();goToProfileById(\'' + Shell.esc(creatorId) + '\')">' +
        '<div class="author-avatar">' + initials + '</div>' +
        '<div><div class="author-name">' + Shell.esc(creatorName) + '</div>' +
        '<div class="author-handle">@' + Shell.esc((p.creator_username || creatorName).toLowerCase().replace(/\s+/g, '_')) + ' · ' + relTime(p.createdAt) + '</div></div>' +
      '</div>' +
      '<div class="card-badges">' +
        '<span class="badge badge-topic">' + Shell.esc(topicLabel) + '</span>' +
        '<span class="badge badge-diff-' + p.difficulty + '">' + (DIFF_LABELS[p.difficulty] || p.difficulty) + '</span>' +
      '</div>' +
    '</div>' +
    '<div class="card-problem"><div class="math-display" data-latex="' + Shell.esc(p.problem_text ? (p.problem_text.latex || '') : '') + '"></div></div>' +
    '<div class="card-footer">' +
      '<div class="card-stats">' +
        
        '<span class="stat-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>' + attempts + '</span>' +
        '<span class="stat-pill" style="color:var(--accent);">' + accuracy + '%</span>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="action-btn ' + (p.user_upvoted ? 'upvoted' : '') + '" id="uv-' + p._id + '" onclick="event.stopPropagation();toggleUpvote(\'' + p._id + '\',this)">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/><path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>' +
          '<span id="uc-' + p._id + '">' + (p.upvotes || 0) + '</span>' +
        '</button>' + solvedBtn +
      '</div>' +
    '</div>';

  el.addEventListener('click', function () { navigateToCard(p._id); });
  return el;
}

async function navigateToCard(id) {
  fetch('/challenges/problems/' + id + '/view', { method: 'POST', credentials: 'same-origin' }).catch(function () {});
  var vc = document.getElementById('vc-' + id);
  if (vc) vc.textContent = (parseInt(vc.textContent) || 0) + 1;
  window.location.href = '/problem?id=' + id;
}

async function toggleUpvote(id, btn) {
  try {
    var r = await fetch('/challenges/problems/' + id + '/upvote', { method: 'POST', credentials: 'same-origin' });
    var d = await r.json();
    if (r.ok) {
      document.getElementById('uc-' + id).textContent = d.upvotes;
      btn.classList.toggle('upvoted', d.action === 'added');
    }
  } catch (e) { Shell.showToast('Failed to upvote', 'error'); }
}

function friendsEmpty() {
  return '<div class="feed-empty"><div class="feed-empty-icon">👥</div><h3>No posts from following yet</h3><p>Follow people to see their problems here.</p><button class="btn-discover" onclick="activatePage(\'leaderboard\')">Find people</button></div>';
}
function discoverEmpty() {
  return '<div class="feed-empty"><div class="feed-empty-icon">🔭</div><h3>Nothing found</h3><p>Try different filters.</p></div>';
}

/* ══════════════════════════════════════════
   BOOT
   ══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', function () {
  Shell.init({ active: 'explore' });

  // Handle leaderboard nav button (Shell.goToLeaderboard dispatches hashchange)
  function handleHash() {
    if (window.location.hash === '#leaderboard') {
      activatePage('leaderboard');
    } else {
      activatePage('explore');
    }
  }
  window.addEventListener('hashchange', handleHash);
  handleHash(); // run on initial load too
  
  Shell.onMeReady(function () {
  var me = Shell.me;
  if (me && (me.username === 'hasan_ghaith_' || me.username === 'greg')) {
    var btn = document.createElement('a');
    btn.href = '/admin.html';
    btn.textContent = '⚙ Admin';
    btn.style.cssText = 'display:inline-flex;align-items:center;padding:0.4rem 0.9rem;border-radius:8px;background:rgba(255,71,87,0.12);border:1px solid rgba(255,71,87,0.3);color:#ff4757;font-size:0.78rem;font-weight:700;font-family:Syne,sans-serif;text-decoration:none;margin:0.75rem 0;transition:all 0.2s;';
    btn.onmouseover = function(){ this.style.background='rgba(255,71,87,0.22)'; };
    btn.onmouseout  = function(){ this.style.background='rgba(255,71,87,0.12)'; };
    document.getElementById('page-explore').insertBefore(btn, document.getElementById('page-explore').firstChild);
  }
});
  loadFeed(true);
});
</script>
