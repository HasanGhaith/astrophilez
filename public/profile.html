<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        :root {
            --bg: #f4f4f5;
            --card-bg: #ffffff;
            --text: #18181b;
            --text-muted: #71717a;
            --border: #e4e4e7;
            --accent: #2563eb;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header / Nav */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 700; font-size: 1.2rem; text-decoration: none; color: var(--text); }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--text-muted); font-size: 0.9rem; }
        .nav-links a:hover { color: var(--accent); }

        /* Profile Stats Grid */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background: #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #666;
            font-weight: bold;
        }

        .user-details h1 { margin: 0 0 5px 0; font-size: 1.5rem; }
        .user-details p { margin: 0; color: var(--text-muted); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-top: 4px; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 0;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        /* Lists */
        .problem-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .problem-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .problem-main { flex: 1; }
        .problem-topic { 
            display: inline-block; 
            padding: 2px 8px; 
            background: #e0f2fe; 
            color: #0369a1; 
            border-radius: 12px; 
            font-size: 0.75rem; 
            margin-bottom: 6px;
        }
        .problem-title { font-weight: 600; display: block; margin-bottom: 4px; text-decoration: none; color: inherit; }
        .problem-title:hover { color: var(--accent); }
        .problem-meta { font-size: 0.85rem; color: var(--text-muted); }

        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            text-align: right;
            min-width: 80px;
        }
        .badge-difficulty { background: #f3f4f6; color: #374151; }
        .badge-rating { background: #dcfce7; color: #166534; }

        .hidden { display: none; }
        .error-msg { color: #ef4444; text-align: center; margin-top: 40px; }
        .loading { text-align: center; color: var(--text-muted); margin-top: 40px; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <a href="/explore.html" class="logo">MathChallenges</a>
        <nav class="nav-links">
            <a href="/explore.html">Explore</a>
            <a href="/profile.html">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <!-- Stats Section -->
    <section id="stats-section" class="hidden">
        <div class="profile-card">
            <div class="user-info">
                <div class="avatar" id="user-avatar">?</div>
                <div class="user-details">
                    <h1 id="display-name">Loading...</h1>
                    <p id="username">@loading</p>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-label">Solver Rating</div>
                    <div class="stat-value" id="solver-rating">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Solver Score</div>
                    <div class="stat-value" id="solver-score">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Creator Score</div>
                    <div class="stat-value" id="creator-score">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Total Solves</div>
                    <div class="stat-value" id="total-solves">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Streak</div>
                    <div class="stat-value" id="current-streak">-</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Content Tabs -->
    <div id="content-area" class="hidden">
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('created')">Created Problems</button>
            <button class="tab-btn" onclick="switchTab('solved')">Solved History</button>
        </div>

        <div id="tab-created">
            <ul id="created-list" class="problem-list">
                <!-- Populated by JS -->
            </ul>
        </div>

        <div id="tab-solved" class="hidden">
            <p style="text-align:center; color: #666; padding: 20px;">
                Solved history requires a backend endpoint (e.g., GET /api/users/me/attempts).
            </p>
            <ul id="solved-list" class="problem-list">
                <!-- Populated by JS if endpoint existed -->
            </ul>
        </div>
    </div>

    <div id="loading" class="loading">Loading profile data...</div>
    <div id="error" class="error-msg hidden"></div>
</div>

<script>
    // ── Configuration ────────────────────────────────────────────────────────
    // Note: The backend router provided (challenges.js) handles /challenges/problems/mine.
    // We assume a /api/auth/me or /api/users/me exists to get full user stats. 
    // If not, you will need to add that route to your server.
    const API_ME = '/api/auth/me'; 
    const API_MY_PROBLEMS = '/challenges/problems/mine';

    // ── State ────────────────────────────────────────────────────────────────
    let currentUser = null;

    // ── Init ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
        // Check simple auth presence
        if (!document.cookie.includes('accessToken')) {
            window.location.href = '/login.html';
            return;
        }

        await fetchProfileData();
        await fetchMyProblems();
    });

    // ── API Calls ────────────────────────────────────────────────────────────
    async function fetchProfileData() {
        try {
            const res = await fetch(API_ME);
            if (!res.ok) throw new Error('Failed to fetch user');
            
            const data = await res.json();
            if (data.success && data.user) {
                currentUser = data.user;
                renderStats(currentUser);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('stats-section').classList.remove('hidden');
                document.getElementById('content-area').classList.remove('hidden');
            } else {
                throw new Error('Invalid user data');
            }
        } catch (err) {
            console.error(err);
            // Fallback: If /api/auth/me doesn't exist yet, show a generic view
            // but still try to load created problems which we know exists.
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('stats-section').classList.remove('hidden');
            document.getElementById('content-area').classList.remove('hidden');
            
            // Render generic stats if API missing
            document.getElementById('display-name').textContent = "User";
            document.getElementById('error').textContent = "Could not load detailed stats (Endpoint /api/auth/me missing or auth failed).";
            document.getElementById('error').classList.remove('hidden');
        }
    }

    async function fetchMyProblems() {
        const listEl = document.getElementById('created-list');
        listEl.innerHTML = '<li class="loading">Loading problems...</li>';

        try {
            const res = await fetch(API_MY_PROBLEMS);
            const data = await res.json();

            listEl.innerHTML = ''; // Clear loading

            if (data.success && data.problems.length > 0) {
                data.problems.forEach(pb => {
                    const li = document.createElement('li');
                    li.className = 'problem-item';
                    li.innerHTML = `
                        <div class="problem-main">
                            <span class="problem-topic">${pb.topic || 'general'}</span>
                            <a href="/problem.html?id=${pb._id}" class="problem-title">${pb.problem_text.latex}</a>
                            <div class="problem-meta">
                                ${pb.total_attempts} attempts • ${pb.success_rate ? (pb.success_rate * 100).toFixed(1) : 0}% success rate
                            </div>
                        </div>
                        <div style="text-align:right">
                            <div class="badge badge-rating">Elo: ${Math.round(pb.rating)}</div>
                            <div class="badge badge-difficulty" style="margin-top:5px">Diff: ${pb.difficulty}</div>
                        </div>
                    `;
                    listEl.appendChild(li);
                });
            } else {
                listEl.innerHTML = '<li style="text-align:center; padding:20px; color:#888;">You haven\'t created any problems yet.</li>';
            }
        } catch (err) {
            console.error(err);
            listEl.innerHTML = '<li style="text-align:center; color:red;">Failed to load problems.</li>';
        }
    }

    // ── UI Rendering ──────────────────────────────────────────────────────────
    function renderStats(user) {
        // Identity
        document.getElementById('display-name').textContent = user.displayName || user.username || 'User';
        document.getElementById('username').textContent = '@' + (user.username || 'unknown');
        
        // Avatar Initials
        const initials = (user.displayName || user.username || 'U').substring(0, 2).toUpperCase();
        document.getElementById('user-avatar').textContent = initials;

        // Numbers
        document.getElementById('solver-rating').textContent = Math.round(user.solver_rating || 800);
        document.getElementById('solver-score').textContent = Math.round(user.solver_score || 0);
        document.getElementById('creator_score').textContent = Math.round(user.creator_score || 0); // Note: Schema in challenges.js implies creator_score
        document.getElementById('total-solves').textContent = user.total_solves || 0;
        document.getElementById('current-streak').textContent = user.current_streak || 0;
    }

    function switchTab(tabName) {
        // Toggle buttons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Toggle content
        document.getElementById('tab-created').classList.add('hidden');
        document.getElementById('tab-solved').classList.add('hidden');
        
        document.getElementById(`tab-${tabName}`).classList.remove('hidden');
    }

    function logout() {
        // Simple logout by clearing cookie and reloading
        document.cookie = "accessToken=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        window.location.href = '/login.html';
    }
</script>

</body>
</html>
