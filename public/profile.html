<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Astrophiles</title>
  <link rel="icon" href="/static/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <!-- ★ Shared shell styles -->
  <link rel="stylesheet" href="/static/shell.css">

  <style>
    /* ── Avatar ── */
    .avatar-circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(243,209,59,0.15); border: 2px solid rgba(243,209,59,0.35);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.8rem;
      color: var(--accent); flex-shrink: 0;
    }

    /* ── Avatar + meta row ── */
    .avatar-section {
      display: flex; align-items: flex-start; gap: 1rem;
      padding: 1.5rem 1.75rem 1rem;
    }

    .profile-meta   { flex: 1; min-width: 0; }
    .profile-name   { font-family:'Syne',sans-serif; font-weight:700; font-size:1.5rem; letter-spacing:-0.02em; display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom: 2px; }
    .profile-handle { font-size:0.82rem; color:var(--muted); margin: 0 0 6px; }
    .profile-bio    { font-size:0.9rem; line-height:1.6; opacity:0.85; margin-bottom:8px; }
    .profile-bio.empty { color:var(--muted); font-style:italic; }
    .join-date      { font-size:0.75rem; color:var(--muted); display:flex; align-items:center; gap:4px; }
    .join-date svg  { width:12px; height:12px; }

    /* ── Stats row ── */
    .stats-row { display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--border); }
    .stat-item { padding:1rem 0.4rem; text-align:center; }
    .stat-item:not(:last-child) { border-right:1px solid var(--border); }
    .stat-value { font-family:'Syne',sans-serif; font-weight:700; font-size:1.15rem; display:block; }
    .stat-value.accent { color:var(--accent); }
    .stat-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:2px; display:block; }

    /* ── Rank cards ── */
    .rank-cards      { display:grid; grid-template-columns:1fr 1fr; gap:0.75rem; padding:1rem 1.75rem; border-top:1px solid var(--border); }
    .rank-card       { background:rgba(5,8,15,0.5); border:1px solid var(--border); border-radius:14px; padding:0.9rem 1rem; display:flex; align-items:center; gap:0.75rem; transition:border-color 0.2s; }
    .rank-card:hover { border-color:rgba(243,209,59,0.2); }
    .rank-card-icon  { font-size:1.4rem; flex-shrink:0; line-height:1; }
    .rank-card-value { font-family:'Syne',sans-serif; font-weight:800; font-size:1.2rem; color:var(--accent); display:block; line-height:1; }
    .rank-card-label { font-size:0.67rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:3px; display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ── Performance section ── */
    .perf-section { display: none; padding:1rem 1.75rem; border-top:1px solid var(--border); }
    .perf-title   { font-family:'Syne',sans-serif; font-weight:700; font-size:0.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.85rem; display:flex; align-items:center; gap:6px; }
    .perf-title::after { content:''; flex:1; height:1px; background:var(--border); }
    .perf-grid    { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; margin-bottom:0.6rem; }
    .perf-card    { background:rgba(5,8,15,0.5); border:1px solid var(--border); border-radius:12px; padding:0.8rem 0.6rem; text-align:center; transition:border-color 0.2s; }
    .perf-card:hover { border-color:rgba(122,133,153,0.35); }
    .perf-val     { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; display:block; margin-bottom:2px; }
    .perf-label   { font-size:0.63rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
    .accuracy-row { background:rgba(5,8,15,0.5); border:1px solid var(--border); border-radius:12px; padding:0.75rem 1rem; display:flex; align-items:center; gap:1rem; }
    .accuracy-pct { font-family:'Syne',sans-serif; font-weight:800; font-size:1.1rem; color:var(--success); }
    .accuracy-sub { font-size:0.63rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
    .accuracy-bar-wrap { flex:1; background:rgba(255,255,255,0.06); border-radius:6px; height:6px; overflow:hidden; }
    .accuracy-bar { height:100%; border-radius:6px; background:linear-gradient(90deg,var(--success),#a8f5c7); transition:width 1s cubic-bezier(0.16,1,0.3,1); }
    .accuracy-attempts { font-size:0.72rem; color:var(--muted); flex-shrink:0; white-space:nowrap; }

    /* ── Action row ── */
    .action-row { padding:0.75rem 1.75rem; border-top:1px solid var(--border); display:flex; gap:8px; }
    .btn-follow { flex:1; padding:0.65rem 1rem; border-radius:11px; font-size:0.88rem; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; transition:all 0.22s; border:none; }
    .btn-follow.follow     { background:linear-gradient(135deg,var(--accent),#d4851a); color:#05080f; }
    .btn-follow.follow:hover { transform:translateY(-1px); box-shadow:0 8px 20px var(--accent-glow); }
    .btn-follow.following  { background:transparent; border:1px solid var(--border); color:var(--muted); }
    .btn-follow.following:hover { border-color:rgba(255,71,87,0.4); color:var(--error); }
    .btn-edit   { flex:1; padding:0.65rem 1rem; border-radius:11px; background:linear-gradient(135deg,var(--accent),#d4851a); color:#05080f; font-size:0.88rem; font-weight:700; font-family:'Syne',sans-serif; cursor:pointer; transition:all 0.22s; border:none; }
    .btn-edit:hover { transform:translateY(-1px); box-shadow:0 8px 20px var(--accent-glow); }

    /* ── Posts grid ── */
    .posts-section { margin-top:1.25rem; }
    .posts-header  { display:flex; align-items:center; justify-content:space-between; padding:0 0.25rem; margin-bottom:0.75rem; }
    .posts-header-title { font-family:'Syne',sans-serif; font-weight:700; font-size:0.9rem; }
    .posts-count-badge  { font-size:0.7rem; background:var(--accent-dim); border:1px solid rgba(243,209,59,0.2); color:var(--accent); border-radius:8px; padding:2px 8px; font-weight:600; }
    .posts-grid    { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.75rem; }
    .post-card     { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; cursor:pointer; transition:all 0.18s; animation:fadeUp 0.3s cubic-bezier(0.16,1,0.3,1) both; }
    .post-card:hover { border-color:rgba(243,209,59,0.25); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,0.35); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .post-math     { padding:0.75rem; min-height:72px; display:flex; align-items:center; justify-content:center; background:rgba(5,8,15,0.5); border-bottom:1px solid var(--border); overflow:hidden; font-size:0.85rem; }
    .post-footer   { padding:0.55rem 0.75rem; display:flex; align-items:center; justify-content:space-between; }
    .post-diff     { font-size:0.65rem; font-weight:600; letter-spacing:0.04em; text-transform:uppercase; padding:1px 6px; border-radius:4px; }
    .pd-1,.pd-2 { background:rgba(46,213,115,0.1); color:#2ed573; border:1px solid rgba(46,213,115,0.2); }
    .pd-3 { background:rgba(243,209,59,0.1); color:var(--accent); border:1px solid rgba(243,209,59,0.2); }
    .pd-4 { background:rgba(255,165,2,0.1); color:#ffa502; border:1px solid rgba(255,165,2,0.2); }
    .pd-5 { background:rgba(255,71,87,0.1); color:var(--error); border:1px solid rgba(255,71,87,0.2); }
    .post-stats    { display:flex; align-items:center; gap:6px; font-size:0.65rem; color:var(--muted); }
    .post-stat     { display:flex; align-items:center; gap:2px; }
    .post-stat svg { width:10px; height:10px; }

    /* ── Edit modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); align-items:center; justify-content:center; padding:1rem; }
    .modal-overlay.open { display:flex; }
    .modal        { background:#0c1220; border:1px solid var(--border); border-radius:20px; width:100%; max-width:460px; animation:modalIn 0.35s cubic-bezier(0.16,1,0.3,1) both; overflow:hidden; }
    @keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(10px)} to{opacity:1;transform:scale(1) translateY(0)} }
    .modal-header { padding:1.25rem 1.5rem; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .modal-title  { font-family:'Syne',sans-serif; font-weight:700; font-size:1.1rem; }
    .modal-close  { width:32px; height:32px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
    .modal-close:hover { color:var(--fg); border-color:rgba(255,255,255,0.3); }
    .modal-close svg { width:14px; height:14px; }
    .modal-body   { padding:1.5rem; }
    .form-group   { margin-bottom:1.25rem; }
    .form-label   { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.5rem; }
    .form-input   { width:100%; padding:0.75rem 1rem; background:rgba(5,8,15,0.6); border:1px solid var(--border); border-radius:11px; color:var(--fg); font-size:0.9rem; font-family:'DM Sans',sans-serif; transition:all 0.22s; outline:none; }
    .form-input:focus { border-color:rgba(243,209,59,0.5); box-shadow:0 0 0 3px rgba(243,209,59,0.08); }
    .form-input::placeholder { color:rgba(122,133,153,0.5); }
    textarea.form-input { resize:vertical; min-height:80px; }
    .form-hint    { font-size:0.72rem; color:var(--muted); margin-top:0.35rem; }
    .form-hint.error { color:var(--error); }
    .country-select-wrap { position:relative; }
    .country-select { width:100%; padding:0.75rem 1rem; background:rgba(5,8,15,0.6); border:1px solid var(--border); border-radius:11px; color:var(--fg); font-size:0.9rem; font-family:'DM Sans',sans-serif; transition:all 0.22s; outline:none; appearance:none; cursor:pointer; }
    .country-select:focus { border-color:rgba(243,209,59,0.5); }
    .country-select option { background:#0c1220; }
    .country-arrow { position:absolute; right:1rem; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); }
    .country-arrow svg { width:14px; height:14px; }
    .modal-footer { padding:0 1.5rem 1.5rem; display:flex; gap:0.75rem; }
    .btn-cancel   { flex:1; padding:0.7rem; border-radius:11px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:0.88rem; font-weight:600; font-family:'DM Sans',sans-serif; cursor:pointer; transition:all 0.2s; }
    .btn-cancel:hover { color:var(--fg); border-color:rgba(255,255,255,0.3); }
    .btn-save     { flex:1; padding:0.7rem; border-radius:11px; background:linear-gradient(135deg,var(--accent),#d4851a); color:#05080f; font-size:0.88rem; font-weight:700; font-family:'Syne',sans-serif; border:none; cursor:pointer; transition:all 0.22s; }
    .btn-save:hover { transform:translateY(-1px); box-shadow:0 8px 20px var(--accent-glow); }
    .btn-save:disabled { opacity:0.5; cursor:not-allowed; transform:none; box-shadow:none; }

    /* ── Responsive ── */
    @media(max-width:680px) {
      .avatar-section { padding:1.25rem 1.25rem 1rem; }
      .rank-cards     { padding:0.85rem 1.25rem; }
      .perf-section   { padding:1rem 1.25rem; }
      .action-row     { padding:0.75rem 1.25rem; }
    }
    @media(max-width:500px) {
      .stats-row { grid-template-columns:repeat(2,1fr); }
      .stats-row .stat-item:nth-child(2) { border-right:none; }
      .stats-row .stat-item:nth-child(3) { border-top:1px solid var(--border); }
      .perf-grid { grid-template-columns:repeat(2,1fr); }
      .posts-grid { grid-template-columns:repeat(2,1fr); }
      .avatar-section { flex-direction:column; align-items:center; text-align:center; }
      .join-date { justify-content:center; }
      .rank-cards { gap:0.5rem; padding:0.75rem 1rem; }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div class="center-wrapper">
    <div class="main-content">
      <!-- shell.js injects the mobile top-nav here -->

      <div style="margin-top:0.75rem;">

        <div id="loadingState" class="glass" style="padding:2rem;text-align:center;">
          <div class="sk" style="width:88px;height:88px;border-radius:50%;margin:0 auto 1rem;"></div>
          <div class="sk" style="width:160px;height:20px;margin:0 auto 0.5rem;"></div>
          <div class="sk" style="width:100px;height:14px;margin:0 auto 1.5rem;"></div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;">
            <div class="sk" style="height:56px;border-radius:8px;"></div>
            <div class="sk" style="height:56px;border-radius:8px;"></div>
            <div class="sk" style="height:56px;border-radius:8px;"></div>
            <div class="sk" style="height:56px;border-radius:8px;"></div>
          </div>
        </div>

        <div id="errorState" style="display:none;text-align:center;padding:3rem 1rem;color:var(--muted);">
          <div style="font-size:2.5rem;margin-bottom:0.75rem;">🔭</div>
          <h3 style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--fg);margin-bottom:0.4rem;">Profile not found</h3>
          <p style="font-size:0.85rem;margin-bottom:1.5rem;">This user could not be loaded.</p>
          <button onclick="history.back()" style="padding:0.55rem 1.1rem;border-radius:9px;background:var(--accent-dim);border:1px solid rgba(243,209,59,0.3);color:var(--accent);font-size:0.82rem;font-weight:600;cursor:pointer;">Go Back</button>
        </div>

        <div id="profileContent" style="display:none;">
          <div class="glass">
            <div class="avatar-section">
              <div class="avatar-circle" id="avatarEl">?</div>
              <div class="profile-meta">
                <div class="profile-name"   id="profileName">—</div>
                <div class="profile-handle" id="profileHandle">@—</div>
                <div class="profile-bio empty" id="profileBio">No bio yet.</div>
                <div class="join-date" id="joinDate">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                  <span>—</span>
                </div>
              </div>
            </div>

            <div class="stats-row">
              <div class="stat-item"><span class="stat-value accent" id="statElo">—</span><span class="stat-label">Elo Rating</span></div>
              <div class="stat-item"><span class="stat-value" id="statPosts">—</span><span class="stat-label">Problems</span></div>
              <div class="stat-item"><span class="stat-value" id="statFollowers">—</span><span class="stat-label">Followers</span></div>
              <div class="stat-item"><span class="stat-value" id="statFollowing">—</span><span class="stat-label">Following</span></div>
            </div>

            <div class="rank-cards">
              <div class="rank-card">
                <div class="rank-card-icon">🌍</div>
                <div>
                  <span class="rank-card-value" id="rankWorld">—</span>
                  <span class="rank-card-label">World rank</span>
                </div>
              </div>
              <div class="rank-card" id="countryRankCard">
                <div class="rank-card-icon" id="countryFlag">🏳</div>
                <div>
                  <span class="rank-card-value" id="rankCountry">—</span>
                  <span class="rank-card-label" id="rankCountryLabel">Country rank</span>
                </div>
              </div>
            </div>

            <div class="perf-section" id="perfSection" style="display:none;">
              <div class="perf-title">Performance</div>
              <div class="perf-grid">
                <div class="perf-card"><span class="perf-val" style="color:var(--success)" id="perfSolverElo">—</span><span class="perf-label">Solver Elo</span></div>
                <div class="perf-card"><span class="perf-val" style="color:var(--arena)"   id="perfCreatorScore">—</span><span class="perf-label">Creator Score</span></div>
                <div class="perf-card"><span class="perf-val" style="color:var(--accent)"  id="perfStreak">—</span><span class="perf-label">Streak 🔥</span></div>
              </div>
              <div class="accuracy-row">
                <div>
                  <div class="accuracy-pct" id="perfAccuracy">—%</div>
                  <div class="accuracy-sub">Accuracy</div>
                </div>
                <div class="accuracy-bar-wrap"><div class="accuracy-bar" id="accuracyBar" style="width:0%;"></div></div>
                <div class="accuracy-attempts" id="perfAttempts">— attempts</div>
              </div>
            </div>

            <div class="action-row" id="actionRow"></div>
          </div>

          <div class="posts-section">
            <div class="posts-header">
              <span class="posts-header-title">Problems Posted</span>
              <span class="posts-count-badge" id="postsCountBadge">0</span>
            </div>
            <div class="posts-grid" id="postsGrid"></div>
            <div id="postsEmpty" style="display:none;text-align:center;padding:2.5rem 1rem;color:var(--muted);">
              <div style="font-size:2rem;margin-bottom:0.5rem;opacity:0.4;">📐</div>
              <p style="font-size:0.85rem;">No problems posted yet.</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<!-- Edit profile modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Profile</span>
      <button class="modal-close" onclick="closeEditModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Display Name</label>
        <input type="text" class="form-input" id="editName" placeholder="Your display name" maxlength="40">
        <div class="form-hint" id="editNameHint"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Bio</label>
        <textarea class="form-input" id="editBio" placeholder="Tell others about yourself…" rows="3" maxlength="200"></textarea>
        <div class="form-hint"><span id="bioCharCount">0</span>/200 characters</div>
      </div>
      <div class="form-group">
        <label class="form-label">Country</label>
        <div class="country-select-wrap">
          <select class="country-select" id="editCountry"><option value="">Select country…</option></select>
          <div class="country-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
      <button class="btn-save" id="saveBtn" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>
</div>

<!-- ★ Shared shell — must load before page script -->
<script src="/static/shell.js"></script>

<script>

function populateCountries() {
  const sel = document.getElementById('editCountry');
  Object.keys(Shell.COUNTRY_NAMES)
    .sort((a,b) => Shell.COUNTRY_NAMES[a].localeCompare(Shell.COUNTRY_NAMES[b]))
    .forEach(code => {
      const opt = document.createElement('option');
      opt.value = code;
      opt.textContent = `${Shell.CMAP[code]||''} ${Shell.COUNTRY_NAMES[code]}`;
      sel.appendChild(opt);
    });
}

/* ── State ── */
let targetUser = null, isFollowing = false;

/* ── Rank loading ── */
async function loadRanks(user) {
  const myElo = Shell.userElo(user);
  let worldRank = '—', countryRank = '—';
  try {
    const r = await fetch('/api/leaderboard?limit=1000', { credentials:'same-origin' });
    if (r.ok) {
      const d = await r.json();
      const list = d.users || d.data || (Array.isArray(d) ? d : []);
      const rCountry = (user.country||'').toUpperCase();
      if (list.length) {
        worldRank = `#${list.filter(u => Shell.userElo(u) > myElo).length + 1}`;
        if (rCountry) {
          const cl = list.filter(u => (u.country||'').toUpperCase() === rCountry || (u.country_code||'').toUpperCase() === rCountry);
          countryRank = `#${cl.filter(u => Shell.userElo(u) > myElo).length + 1}`;
        }
      }
    }
  } catch(e) { console.error('[Profile] loadRanks:', e); }
  document.getElementById('rankWorld').textContent   = worldRank;
  document.getElementById('rankCountry').textContent = countryRank;
  const rCountry = (user.country||'').toUpperCase();
  if (rCountry) {
    document.getElementById('countryFlag').textContent       = Shell.CMAP[rCountry] || '🏳';
    document.getElementById('rankCountryLabel').textContent  = `Rank in ${Shell.COUNTRY_NAMES[rCountry]||rCountry}`;
  } else {
    document.getElementById('countryRankCard').style.opacity  = '0.4';
    document.getElementById('rankCountryLabel').textContent   = 'No country set';
  }
}

/* ── Render ── */
function renderProfile(u, problems) {
  const elo  = Shell.userElo(u);
  const isMe = Shell.me && u._id?.toString() === Shell.me._id?.toString();

  document.getElementById('avatarEl').textContent = (u.displayName||u.username||'?')[0].toUpperCase();

  const uCountry = (u.country||'').toUpperCase();
  document.getElementById('profileName').innerHTML    = `${Shell.esc(u.displayName||u.username)} <span style="font-size:1.1rem;">${Shell.CMAP[uCountry]||''}</span>`;
  document.getElementById('profileHandle').textContent = '@'+(u.username||'');
  const bioEl = document.getElementById('profileBio');
  if (u.bio?.trim()) { bioEl.textContent = u.bio.trim(); bioEl.classList.remove('empty'); }
  else               { bioEl.textContent = 'No bio yet.'; bioEl.classList.add('empty'); }
  if (u.createdAt)
    document.querySelector('#joinDate span').textContent = 'Joined ' +
      new Date(u.createdAt).toLocaleDateString('en-US',{month:'long',year:'numeric'});

      // document.getElementById('statElo').textContent = Shell.userElo(u);
  document.getElementById('statElo').textContent       = elo;
  document.getElementById('statPosts').textContent     = problems.length;
  document.getElementById('statFollowers').textContent = Array.isArray(u.followers) ? u.followers.length : (+(u.followers)||0);
  document.getElementById('statFollowing').textContent = Array.isArray(u.following) ? u.following.length : (+(u.following)||0);

  console.log('[Profile] user doc:', JSON.parse(JSON.stringify(u)));
  const solverElo    = +(u.solver_rating ?? u.solver_score  ?? u.solver_points ?? 0);
  const creatorScore = +(u.creator_score  ?? u.creator_points ?? 0);
  const streak       = +(u.current_streak ?? u.streak ?? 0);
  const correct      = +(u.total_solves   ?? u.correct_answers ?? u.correct_attempts ?? u.solves ?? 0);
  const attempts     = +(u.total_attempts ?? u.attempts ?? u.submissions ?? 0);
  const acc          = attempts > 0 ? Math.round(correct / attempts * 100) : 0;

  document.getElementById('perfSolverElo').textContent    = Math.round(solverElo);
  document.getElementById('perfCreatorScore').textContent = Math.round(creatorScore);
  document.getElementById('perfStreak').textContent       = streak;
  document.getElementById('perfAccuracy').textContent     = acc + '%';
  document.getElementById('accuracyBar').style.width      = acc + '%';
  document.getElementById('perfAttempts').textContent     = `${attempts} attempt${attempts!==1?'s':''}`;
  document.getElementById('perfSection').style.display    = 'block';

  const ar = document.getElementById('actionRow');
  if (isMe) {
    ar.innerHTML = `<button class="btn-edit" onclick="openEditModal()">✎ Edit Profile</button>`;
  } else {
    ar.innerHTML = `<button class="btn-follow ${isFollowing?'following':'follow'}" id="followBtn" onclick="toggleFollow('${Shell.esc(u._id)}')">${isFollowing?'✓ Following':'+ Follow'}</button>`;
  }

  renderPosts(problems);
  document.getElementById('loadingState').style.display   = 'none';
  document.getElementById('profileContent').style.display = 'block';
  document.title = isMe ? 'Profile – Astrophiles' : `${u.displayName||u.username} – Astrophiles`;
  loadRanks(u);
}

function renderPosts(problems) {
  const grid  = document.getElementById('postsGrid');
  const empty = document.getElementById('postsEmpty');
  document.getElementById('postsCountBadge').textContent = problems.length;
  if (!problems.length) { grid.style.display='none'; empty.style.display='block'; return; }
  grid.innerHTML = '';
  problems.slice(0,24).forEach((p,i) => {
    if (i===0) console.log('[Profile] problem doc:', JSON.parse(JSON.stringify(p)));
    const card = document.createElement('div');
    card.className = 'post-card';
    card.style.animationDelay = `${i*0.04}s`;
    card.onclick = () => { window.location.href = `/problem?id=${p._id}`; };
    const latex  = p.problem_text?.latex || p.problem_text || p.latex || '';
    const diff   = p.difficulty || 1;
    const views  = +(p.view_count ?? p.views ?? p.total_views ?? p.viewCount ?? 0);
    const solves = +(p.correct_attempts ?? p.correct ?? p.solves ?? 0);
    card.innerHTML = `
      <div class="post-math" id="pm-${p._id}"></div>
      <div class="post-footer">
        <span class="post-diff pd-${diff}">${['','Easy','Fair','Med','Hard','Pro'][diff]||diff}</span>
        <div class="post-stats">
          <span class="post-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${views}</span>
          <span class="post-stat" style="color:var(--success);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>${solves}</span>
        </div>
      </div>`;
    grid.appendChild(card);
    const mathEl = card.querySelector(`#pm-${p._id}`);
    if (latex) {
      try { mathEl.innerHTML = katex.renderToString(latex,{displayMode:true,throwOnError:false,maxSize:4}); }
      catch { mathEl.textContent = latex; }
    } else {
      mathEl.style.color = 'var(--muted)'; mathEl.style.fontSize = '0.75rem'; mathEl.textContent = 'No preview';
    }
  });
}

/* ── Edit modal ── */
function openEditModal() {
  const me = Shell.me; if (!me) return;
  document.getElementById('editName').value    = me.displayName || '';
  document.getElementById('editBio').value     = me.bio || '';
  document.getElementById('editCountry').value = me.country || '';
  document.getElementById('bioCharCount').textContent = (me.bio||'').length;
  document.getElementById('editNameHint').textContent = '';
  document.getElementById('editModal').classList.add('open');
  document.getElementById('editName').focus();
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }

document.getElementById('editBio').addEventListener('input', function(){
  document.getElementById('bioCharCount').textContent = this.value.length;
});

async function saveProfile() {
  const name    = document.getElementById('editName').value.trim();
  const bio     = document.getElementById('editBio').value.trim();
  const country = document.getElementById('editCountry').value;
  const btn     = document.getElementById('saveBtn');
  const hint    = document.getElementById('editNameHint');
  if (!name || name.length < 2) {
    hint.textContent = !name ? 'Display name is required' : 'Name must be at least 2 characters';
    hint.className   = 'form-hint error';
    document.getElementById('editName').focus(); return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span style="display:inline-block;animation:spin 0.7s linear infinite">⟳</span> Saving…';
  try {
    const r = await fetch('/api/profile/me',{
      method:'PATCH', credentials:'same-origin',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({displayName:name, bio, country: country.toUpperCase()}),
    });
    const d = await r.json();
    if (r.ok && d.success) {
      const savedCountry = country.toUpperCase();
      document.getElementById('profileName').innerHTML   = `${Shell.esc(name)} <span style="font-size:1.1rem;">${Shell.CMAP[savedCountry]||''}</span>`;
      const bioEl = document.getElementById('profileBio');
      if (bio) { bioEl.textContent = bio; bioEl.classList.remove('empty'); }
      else     { bioEl.textContent = 'No bio yet.'; bioEl.classList.add('empty'); }
      document.getElementById('avatarEl').textContent           = name[0].toUpperCase();
      document.getElementById('shell-nav-avatar').textContent   = name[0].toUpperCase();
      document.getElementById('shell-nav-name').textContent     = name;
      if (savedCountry) {
        document.getElementById('countryFlag').textContent      = Shell.CMAP[savedCountry] || '🏳';
        document.getElementById('rankCountryLabel').textContent = `Rank in ${Shell.COUNTRY_NAMES[savedCountry]||savedCountry}`;
      }
      closeEditModal();
      Shell.showToast('Profile updated!', 'success');
    } else {
      hint.textContent = d.message || 'Failed to update'; hint.className = 'form-hint error';
    }
  } catch {
    hint.textContent = 'Connection error'; hint.className = 'form-hint error';
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}

/* ── Follow ── */
async function toggleFollow(userId) {
  const btn = document.getElementById('followBtn');
  if (!btn || !Shell.me) { Shell.showToast('Sign in to follow','error'); return; }
  btn.disabled = true;
  try {
    const r = await fetch(`/api/users/${userId}/follow`,{method:'POST',credentials:'same-origin'});
    const d = await r.json();
    if (r.ok) {
      isFollowing     = d.action === 'followed';
      btn.className   = `btn-follow ${isFollowing?'following':'follow'}`;
      btn.textContent = isFollowing ? '✓ Following' : '+ Follow';
      const fc = document.getElementById('statFollowers');
      fc.textContent  = (parseInt(fc.textContent)||0) + (isFollowing?1:-1);
      Shell.showToast(isFollowing?'Following!':'Unfollowed','success');
    } else Shell.showToast(d.message||'Failed','error');
  } catch { Shell.showToast('Connection error','error'); }
  finally  { if(btn) btn.disabled = false; }
}

/* ── Data ── */
async function resolveUser() {
  const p = new URLSearchParams(location.search);
  const id = p.get('id'), name = p.get('name');
  if (!id && !name) return Shell.me || null;
  for (const url of [id && `/api/users/${id}`, name && `/api/users/username/${encodeURIComponent(name.toLowerCase())}`].filter(Boolean)) {
    try {
      const r = await fetch(url,{credentials:'same-origin'});
      if (!r.ok) continue;
      const d = await r.json();
      const user = d.user || (Array.isArray(d.users) && d.users[0]);
      if (user) { isFollowing = d.isFollowing||false; return user; }
    } catch {}
  }
  return null;
}

async function loadUserProblems(userId) {
  for (const url of [`/api/users/${userId}/problems`, `/api/problems?creator=${userId}`]) {
    try {
      const r = await fetch(url,{credentials:'same-origin'});
      if (!r.ok) continue;
      const d = await r.json();
      const p = d.problems || d.data || d;
      if (Array.isArray(p)) return p;
    } catch {}
  }
  return [];
}

/* ── Boot ── */
document.addEventListener('DOMContentLoaded', () => {
  Shell.init({ active: 'profile' });

  populateCountries();

  Shell.onMeReady(async () => {
    const user = await resolveUser();
    if (!user) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display   = 'block';
      return;
    }
    targetUser = user;
    renderProfile(user, await loadUserProblems(user._id));
  });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEditModal(); });
});
</script>
