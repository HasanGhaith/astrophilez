<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Portal - Astrophiles</title>
  <link rel="icon" href="logo.png" type="image/png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05080f;
      --bg-secondary: #0c1220;
      --fg: #e8edf5;
      --muted: #7a8599;
      --accent: #f3d13b;
      --accent-dim: rgba(243, 209, 59, 0.12);
      --accent-glow: rgba(243, 209, 59, 0.35);
      --card: rgba(12, 18, 32, 0.75);
      --border: rgba(122, 133, 153, 0.18);
      --border-focus: rgba(243, 209, 59, 0.5);
      --error: #ff4757;
      --success: #2ed573;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow-x: hidden;
      min-height: 100vh;
    }

    #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .nebula {
      position: fixed; border-radius: 50%; filter: blur(80px);
      opacity: 0.18; pointer-events: none; z-index: 0;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .nebula-1 { width:500px; height:500px; background:radial-gradient(circle,#f3d13b,transparent 70%); top:-150px; left:-100px; animation-delay:0s; }
    .nebula-2 { width:400px; height:400px; background:radial-gradient(circle,#00e5ff,transparent 70%); bottom:-100px; right:-80px; animation-delay:-6s; }
    .nebula-3 { width:300px; height:300px; background:radial-gradient(circle,#e040fb,transparent 70%); top:40%; left:60%; animation-delay:-12s; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,20px) scale(1.08); }
    }

    .grid-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      z-index:0; pointer-events:none;
      background-image:
        linear-gradient(rgba(243,209,59,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(243,209,59,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .content-wrapper { position: relative; z-index: 1; min-height: 100vh; }

    .glass-card {
      background: var(--card);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .auth-card {
      width: 100%; max-width: 420px; padding: 2.5rem;
      position: relative; overflow: hidden;
      animation: cardReveal 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .auth-card::before {
      content: ''; position: absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);
      animation: shine 4s ease-in-out infinite; pointer-events: none;
    }

    @keyframes cardReveal {
      from { opacity:0; transform:translateY(24px) scale(0.97); }
      to   { opacity:1; transform:translateY(0) scale(1); }
    }
    @keyframes shine {
      0%  { left:-100%; } 40% { left:120%; } 100% { left:120%; }
    }

    .logo-mark {
      width:48px; height:48px;
      background: linear-gradient(135deg, var(--accent), #d4851a);
      border-radius:14px; display:flex; align-items:center; justify-content:center;
      margin:0 auto 1rem; box-shadow: 0 8px 24px var(--accent-glow);
      font-family:'Syne',sans-serif; font-weight:800; font-size:1.25rem;
      color:#05080f; position:relative;
    }
    .logo-mark::after {
      content:''; position:absolute; inset:-4px;
      border-radius:18px; border:1px solid rgba(243,209,59,0.25);
    }

    .auth-tabs {
      display:flex; background:rgba(5,8,15,0.5); padding:4px;
      border-radius:14px; margin-bottom:2rem;
      border:1px solid var(--border); gap:4px;
    }
    .tab-btn {
      flex:1; padding:0.65rem; text-align:center; background:none; border:none;
      color:var(--muted); font-weight:500; font-size:0.9rem; cursor:pointer;
      border-radius:10px; transition:all 0.25s ease; letter-spacing:0.01em;
    }
    .tab-btn.active {
      background: linear-gradient(135deg,rgba(243,209,59,0.15),rgba(212,133,26,0.1));
      color:var(--accent); border:1px solid rgba(243,209,59,0.3);
      box-shadow:0 2px 12px rgba(243,209,59,0.1);
    }
    .tab-btn:not(.active):hover { color:var(--fg); background:rgba(255,255,255,0.04); }

    .input-group { margin-bottom:1.25rem; }
    .input-label {
      display:block; margin-bottom:0.45rem; font-size:0.8rem;
      color:var(--muted); font-weight:500; letter-spacing:0.05em; text-transform:uppercase;
    }
    .input-wrapper { position:relative; }
    .input-icon {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      color:var(--muted); pointer-events:none; transition:color 0.2s;
      display:flex; align-items:center;
    }
    .input-icon svg { width:16px; height:16px; stroke-width:2; }
    .auth-input {
      width:100%; padding:0.8rem 1rem 0.8rem 2.5rem;
      background:rgba(5,8,15,0.5); border:1px solid var(--border);
      border-radius:11px; color:var(--fg); font-size:0.95rem;
      font-family:'DM Sans',sans-serif; transition:all 0.25s ease;
    }
    .auth-input::placeholder { color:rgba(122,133,153,0.5); }
    .auth-input:focus {
      outline:none; border-color:var(--border-focus);
      background:rgba(5,8,15,0.7); box-shadow:0 0 0 3px rgba(243,209,59,0.08);
    }
    .input-wrapper:focus-within .input-icon { color:var(--accent); }

    .password-wrapper { position:relative; }
    .password-toggle {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      background:transparent; border:none; color:var(--muted); cursor:pointer;
      padding:4px; border-radius:4px; display:flex; align-items:center; justify-content:center;
      transition:color 0.2s;
    }
    .password-toggle:hover { color:var(--fg); }
    .password-toggle svg { width:16px; height:16px; stroke-width:2; }
    .password-wrapper .auth-input { padding-right:2.75rem; }

    .country-select-wrapper { position:relative; }
    .country-select-wrapper .input-icon { z-index:1; }
    .country-flag-preview {
      position:absolute; right:36px; top:50%; transform:translateY(-50%);
      font-size:1.1rem; pointer-events:none; opacity:0; transition:opacity 0.2s;
    }
    .country-flag-preview.visible { opacity:1; }
    .select-chevron {
      position:absolute; right:12px; top:50%; transform:translateY(-50%);
      pointer-events:none; color:var(--muted);
    }
    .select-chevron svg { width:14px; height:14px; stroke-width:2.5; }
    select.auth-input { appearance:none; -webkit-appearance:none; padding-right:2.5rem; cursor:pointer; }
    select.auth-input option { background:#0c1220; color:var(--fg); }

    .strength-meter { margin-top:6px; }
    .strength-bar { height:3px; border-radius:2px; background:var(--border); overflow:hidden; }
    .strength-fill { height:100%; border-radius:2px; width:0%; transition:width 0.4s ease, background 0.4s ease; }
    .strength-label { font-size:0.7rem; color:var(--muted); margin-top:4px; transition:color 0.3s; }

    .username-status { font-size:0.75rem; margin-top:5px; min-height:16px; transition:color 0.2s; }
    .username-status.available { color:var(--success); }
    .username-status.taken     { color:var(--error); }
    .username-status.checking  { color:var(--muted); }

    .error-banner {
      background:rgba(255,71,87,0.1); border:1px solid rgba(255,71,87,0.3);
      border-radius:10px; padding:0.75rem 1rem; font-size:0.82rem; color:#ff6b78;
      margin-bottom:1.25rem; display:none; align-items:flex-start; gap:0.5rem; line-height:1.5;
    }
    .error-banner.visible { display:flex; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #e8b820 50%, #d4851a 100%);
      color:#05080f; font-weight:700; font-size:0.95rem;
      padding:0.875rem 1.5rem; border-radius:12px; border:none; cursor:pointer;
      width:100%; transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display:flex; justify-content:center; align-items:center; gap:0.5rem;
      letter-spacing:0.02em; position:relative; overflow:hidden;
      font-family:'Syne',sans-serif;
    }
    .btn-primary::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.15),transparent);
      opacity:0; transition:opacity 0.2s;
    }
    .btn-primary:hover::after { opacity:1; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 12px 32px var(--accent-glow); }
    .btn-primary:active { transform:translateY(0); }
    .btn-primary:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

    .back-to-home { margin-top:1.75rem; text-align:center; }
    .back-link {
      color:var(--muted); text-decoration:none;
      display:inline-flex; align-items:center; gap:0.4rem;
      font-size:0.82rem; transition:all 0.25s ease; opacity:0.75;
    }
    .back-link:hover { color:var(--accent); opacity:1; transform:translateX(-3px); }
    .back-link svg { width:14px; height:14px; }

    .form-section { display:none; }
    .form-section.active { display:block; animation:fadeSlide 0.3s ease both; }

    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .toast-container { position:fixed; top:20px; right:20px; z-index:100; display:flex; flex-direction:column; gap:10px; }
    .toast {
      min-width:260px; padding:0.875rem 1rem;
      background:rgba(12,18,32,0.95); border:1px solid var(--border);
      border-left:4px solid var(--accent); color:var(--fg); border-radius:10px;
      transform:translateX(120%); transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      backdrop-filter:blur(12px); font-size:0.875rem;
      display:flex; align-items:center; gap:0.6rem;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.show { transform:translateX(0); }
    .toast.success { border-left-color:var(--success); }
    .toast.error   { border-left-color:var(--error); }
    .toast-icon { font-size:1rem; flex-shrink:0; }

    .pulse-dot {
      width:8px; height:8px; border-radius:50%; background:var(--success);
      display:inline-block; box-shadow:0 0 0 0 rgba(46,213,115,0.4);
      animation:pulse 2s infinite;
    }
    @keyframes pulse {
      0%  { box-shadow:0 0 0 0 rgba(46,213,115,0.4); }
      70% { box-shadow:0 0 0 6px rgba(46,213,115,0); }
      100%{ box-shadow:0 0 0 0 rgba(46,213,115,0); }
    }

    .auth-container {
      display:flex; align-items:center; justify-content:center;
      padding:2rem 1rem; min-height:100vh;
    }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 0.8s linear infinite; display:inline-block; vertical-align:middle; }
  </style>
</head>

<body>
<canvas id="starfield"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>
<div class="grid-overlay"></div>
<div class="toast-container" id="toastContainer"></div>

<div class="content-wrapper">
  <div class="auth-container">
    <div class="glass-card auth-card">

// ══════════════════════════════════════════
// USERNAME AVAILABILITY (debounced)
// ══════════════════════════════════════════
let usernameTimer = null;
function checkUsername(val) {
  const status = document.getElementById('usernameStatus');
  clearTimeout(usernameTimer);
  if (!val || val.length < 2) { status.textContent = ''; status.className = 'username-status'; return; }
  status.textContent = 'Checking…'; status.className = 'username-status checking';
  usernameTimer = setTimeout(async () => {
    try {
      const res  = await fetch(`/api/check-username?username=${encodeURIComponent(val)}`);
      const data = await res.json();
      status.textContent = data.available ? '✓ Available' : '✕ Already taken';
      status.className   = `username-status ${data.available ? 'available' : 'taken'}`;
    } catch { status.textContent = ''; }
  }, 500);
}

// ══════════════════════════════════════════
// STRENGTH METER
// ══════════════════════════════════════════
function updateStrength(val) {
  const fill  = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  if (!val) { fill.style.width = '0%'; label.textContent = ''; return; }
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const levels = [
    { w:'25%',  c:'#ff4757', t:'Weak'   },
    { w:'50%',  c:'#ffa502', t:'Fair'   },
    { w:'75%',  c:'#eccc68', t:'Good'   },
    { w:'100%', c:'#2ed573', t:'Strong' },
  ];
  const lvl = levels[Math.max(0, score - 1)];
  fill.style.width = lvl.w; fill.style.background = lvl.c;
  label.textContent = lvl.t; label.style.color = lvl.c;
}

  input.type  = show ? 'text' : 'password';
  const eyeOn  = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  const eyeOff = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  btn.innerHTML = show ? eyeOn : eyeOff;
}

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
async function handleLogin(e) {
  e.preventDefault();
  hideError();
  const btn = document.getElementById('loginBtn');
  const prev = btn.innerHTML;
  btn.innerHTML = spinnerHTML('Authenticating…');
  btn.disabled  = true;

  try {
    const res  = await fetch('/api/login', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('loginUsername').value.trim(),
        password: document.getElementById('loginPassword').value,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      showToast('Welcome back!', 'success');
      setTimeout(() => { window.location.href = '/explore'; }, 700);
      return;
    }
    showError(data.message || 'Login failed');
  } catch {
    showError('Connection error — please try again');
  } finally {
    btn.innerHTML = prev;
    btn.disabled  = false;
  }
}

// ══════════════════════════════════════════
// REGISTER
// ══════════════════════════════════════════
async function handleRegister(e) {
  e.preventDefault();
  hideError();

  if (document.getElementById('usernameStatus').classList.contains('taken')) {
    showError('That username is already taken — please choose another');
    return;
  }

  const btn  = document.getElementById('registerBtn');
  const prev = btn.innerHTML;
  btn.innerHTML = spinnerHTML('Creating account…');
  btn.disabled  = true;

  try {
    const res  = await fetch('/api/register', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        // email: document.getElementById('regEmail').value.trim(),  // uncomment when email verification is enabled
        username: document.getElementById('regUsername').value.trim(),
        password: document.getElementById('regPassword').value,
        country:  document.getElementById('regCountry').value,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      showToast('Welcome to Astrophiles! 🚀', 'success');
      setTimeout(() => { window.location.href = '/profile'; }, 800);
      return;
    }
    showError(data.message || 'Registration failed');
  } catch {
    showError('Connection error — please try again');
  } finally {
    btn.innerHTML = prev;
    btn.disabled  = false;
  }
}

// ══════════════════════════════════════════
// STARFIELD
// ══════════════════════════════════════════
const canvas = document.getElementById('starfield');
const ctx    = canvas.getContext('2d');
let stars    = [];

function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

class Star {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
    this.size = Math.random() * 1.8; this.opacity = Math.random();
    this.speed = Math.random() * 0.015 + 0.004; this.dir = Math.random() > 0.5 ? 1 : -1;
  }
  draw() {
    this.opacity += this.speed * this.dir;
    if (this.opacity > 1 || this.opacity < 0) this.dir *= -1;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${Math.abs(this.opacity)})`;
    ctx.fill();
  }
}

function initStars() {
  stars = [];
  const n = Math.floor((canvas.width * canvas.height) / 3000);
  for (let i = 0; i < n; i++) stars.push(new Star());
}
function animateStars() { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>s.draw()); requestAnimationFrame(animateStars); }
window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
resizeCanvas(); initStars(); animateStars();

// ══════════════════════════════════════════
// TOASTS
// ══════════════════════════════════════════
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  const icons = { success:'✓', error:'✕', default:'✦' };
  toast.className = `toast ${type || 'default'}`;
  toast.innerHTML = `<span class="toast-icon">${icons[type]||icons.default}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, 3500);
}

function spinnerHTML(label) {
  return `<svg class="spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> ${label}`;
}
</script>
