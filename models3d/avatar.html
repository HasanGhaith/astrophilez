<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Avatar Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:#0a0a0f; --panel:#111118; --panel2:#1a1a24; --panel3:#20202e;
    --accent:#c8ff5a; --accent2:#5af0ff; --accent3:#ff7eb3;
    --text:#e8e8f0; --muted:#5a5a72; --border:#2a2a3a; --radius:10px;
  }
  html,body { width:100%; height:100%; background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; overflow:hidden; }

  .layout { display:grid; grid-template-columns:290px 1fr 290px; grid-template-rows:52px 1fr; height:100vh; }

  header { grid-column:1/-1; display:flex; align-items:center; padding:0 20px; gap:14px; border-bottom:1px solid var(--border); background:var(--panel); }
  header h1 { font-family:'Space Mono',monospace; font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
  .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header-tag { margin-left:auto; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

  .sidebar { background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  .sidebar.right { border-right:none; border-left:1px solid var(--border); }
  .sidebar-inner { padding:14px 13px; display:flex; flex-direction:column; gap:13px; overflow-y:auto; flex:1; }

  .sec-label { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); }
  .sec-title  { font-size:12px; font-weight:700; color:var(--text); }
  .section    { display:flex; flex-direction:column; gap:6px; }
  .divider    { height:1px; background:var(--border); flex-shrink:0; }

  /* Slot */
  .slot { background:var(--panel2); border:1px solid var(--border); border-radius:var(--radius); padding:8px 10px; display:flex; flex-direction:column; gap:7px; }
  .slot-header { display:flex; align-items:center; justify-content:space-between; gap:6px; }
  .slot-name { font-size:11px; font-weight:700; color:var(--text); }
  .slot-badge { font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.06em; padding:2px 7px; border-radius:20px; white-space:nowrap; }
  .slot-badge.wardrobe    { background:rgba(200,255,90,.08);  border:1px solid rgba(200,255,90,.2);  color:var(--accent);  }
  .slot-badge.accessory   { background:rgba(90,240,255,.08);  border:1px solid rgba(90,240,255,.2);  color:var(--accent2); }
  .slot-badge.placeholder { background:rgba(255,126,179,.08); border:1px solid rgba(255,126,179,.2); color:var(--accent3); }
  .slot-controls { display:flex; align-items:center; gap:6px; }
  .arrow-btn { width:26px; height:26px; border-radius:6px; border:1px solid var(--border); background:var(--panel3); color:var(--text); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s,color .15s; flex-shrink:0; }
  .arrow-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .arrow-btn:disabled { opacity:.3; cursor:default; }
  .slot-label { flex:1; text-align:center; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.05em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .slot-label.loading { color:var(--accent2); animation:blink .7s infinite; }
  .slot-label.error   { color:#ff6b6b; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* Slot color swatches */
  .slot-colors { display:flex; gap:5px; align-items:center; }
  .clabel { font-family:'Space Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:.05em; margin-right:2px; }
  .slot-swatch { width:18px; height:18px; border-radius:5px; cursor:pointer; border:2px solid transparent; transition:transform .12s,border-color .12s; flex-shrink:0; }
  .slot-swatch:hover { transform:scale(1.15); }
  .slot-swatch.active { border-color:#fff; }

  /* Slot color picker (hair) */
  .slot-picker-row { display:flex; align-items:center; gap:8px; }
  .slot-picker-row .clabel { flex:1; }
  .slot-picker-row input[type="color"] { width:32px; height:24px; border:none; border-radius:5px; cursor:pointer; padding:1px; background:transparent; }

  /* Skin swatches */
  .swatch-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; }
  .swatch { aspect-ratio:1; border-radius:7px; cursor:pointer; border:2px solid transparent; transition:transform .15s,border-color .15s,box-shadow .15s; position:relative; }
  .swatch:hover { transform:scale(1.1); }
  .swatch.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .swatch.active::after { content:'✓'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; color:rgba(255,255,255,.9); text-shadow:0 1px 2px rgba(0,0,0,.9); }

  /* Eye buttons */
  .eye-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
  .eye-btn { display:flex; align-items:center; gap:7px; padding:8px 10px; border-radius:7px; border:1px solid var(--border); background:var(--panel2); color:var(--text); font-family:'Syne',sans-serif; font-size:11px; font-weight:700; cursor:pointer; transition:border-color .2s,background .2s,color .2s; }
  .eye-btn:hover { border-color:var(--muted); }
  .eye-btn.active { border-color:var(--accent2); background:rgba(90,240,255,.06); color:var(--accent2); }
  .eye-dot { width:11px; height:11px; border-radius:50%; flex-shrink:0; border:1px solid rgba(255,255,255,.15); }

  /* Canvas */
  .canvas-area { position:relative; background:radial-gradient(ellipse at 50% 55%,#181828 0%,#0a0a0f 72%); overflow:hidden; }
  #threeCanvas { display:block; width:100%; height:100%; }
  .canvas-hint { position:absolute; bottom:16px; left:50%; transform:translateX(-50%); font-family:'Space Mono',monospace; font-size:8px; letter-spacing:.12em; color:var(--muted); text-transform:uppercase; pointer-events:none; background:rgba(10,10,15,.65); padding:5px 12px; border-radius:20px; border:1px solid var(--border); white-space:nowrap; }
  .grid-overlay { position:absolute; inset:0; background-image:linear-gradient(rgba(90,240,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(90,240,255,.025) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }

  #loadingOverlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(10,10,15,.93); z-index:10; gap:14px; font-family:'Space Mono',monospace; }
  .load-label { font-size:10px; letter-spacing:.14em; color:var(--muted); text-transform:uppercase; }
  .spinner { width:34px; height:34px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>
<body>
<div class="layout">

  <header>
    <div class="dot"></div>
    <h1>Avatar Studio</h1>
    <div class="header-tag">avatar.glb + modular wardrobe</div>
  </header>

  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="sec-label">Base Avatar</div>
      <div class="section">
        <div class="sec-title">Skin Tone</div>
        <div class="swatch-grid" id="skinSwatches"></div>
      </div>
      <div class="divider"></div>
      <div class="sec-label">Wardrobe</div>
      <div class="section" id="wardrobeSlots"></div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="grid-overlay"></div>
    <canvas id="threeCanvas"></canvas>
    <div id="loadingOverlay">
      <div class="spinner"></div>
      <div class="load-label">Loading avatar.glb…</div>
    </div>
    <div class="canvas-hint">Drag to rotate · Scroll to zoom</div>
  </div>

  <div class="sidebar right">
    <div class="sidebar-inner">
      <div class="sec-label">Eyes</div>
      <div class="section">
        <div class="sec-title">Eye Color</div>
        <div class="eye-grid" id="eyeButtons"></div>
      </div>
      <div class="divider"></div>
      <div class="sec-label">Accessories</div>
      <div class="section" id="accessorySlots"></div>
      <div class="divider"></div>
      <div class="sec-label">Coming Soon</div>
      <div class="section" id="placeholderSlots"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script>

/* ╔══════════════════════════════════════════════════════════╗
   ║  MESH NAME CONFIG — only edit here when renaming in      ║
   ║  Blender. Missing names are silently skipped.            ║
   ╚══════════════════════════════════════════════════════════╝ */
var MESH_NAMES = {
  skinMeshes:  ['body_body_base0'],       // all meshes that receive skin color
  eyeIris:     'eyes_eyes_Sphere',     // receives eye color
  eyeWhite:    'Sphere',       // always white, never touched
  basePants:   'pants',   // hidden when pants slot is active
  baseShoes:   'shoes_Cube.001',   // hidden when shoes slot is active
  baseHoodie:  'hoodie (1)',  // hidden when upperbody slot is active
  hairMeshes:  ['hair-bowl_hair-bowl_hair(dense)']
};

/* ╔══════════════════════════════════════════════════════════╗
   ║  SLOT CONFIG                                             ║
   ╚══════════════════════════════════════════════════════════╝ */
var SLOT_CONFIG = [
  {
    key:'hair', label:'Hair',
    folder:'hairstyles', prefix:'hair', maxItems:20,
    hidesMesh:null,
    colorPicker: true,          // use a free color picker instead of swatches
    colorPickerDefault:'#1a1a1a',
    colors:[],                  // unused when colorPicker:true
    panel:'wardrobe'
  },
  {
    key:'upperbody', label:'Top',
    folder:'upperbody', prefix:'shirt', maxItems:20,
    hidesMesh:'baseHoodie',
    colors:['#2a3a5a','#5a2a2a','#2a5a3a'],
    panel:'wardrobe'
  },
  {
    key:'pants', label:'Pants',
    folder:'pants', prefix:'pants', maxItems:20,
    hidesMesh:'basePants',
    colors:['#1a2535','#3a2010','#1a3530'],
    panel:'wardrobe'
  },
  {
    key:'shoes', label:'Shoes',
    folder:'shoes', prefix:'shoes', maxItems:20,
    hidesMesh:'baseShoes',
    colors:['#111111','#8B4513','#e8e8e8'],
    panel:'wardrobe'
  },
  {
    key:'glasses', label:'Glasses',
    folder:'accessories', prefix:'glasses', maxItems:20,
    hidesMesh:null,
    colors:['#111111','#c0a060','#2a2a8a'],
    panel:'accessory'
  },
  {
    key:'beard', label:'Beard',
    folder:'accessories', prefix:'beard', maxItems:20,
    hidesMesh:null,
    colors:['#1a1a1a','#8B4513','#b09060'],
    panel:'accessory'
  },
  { key:'bag',      label:'Bag',          folder:'', prefix:'', maxItems:0, hidesMesh:null, colors:[], panel:'placeholder' },
  { key:'necklace', label:'Necklace',     folder:'', prefix:'', maxItems:0, hidesMesh:null, colors:[], panel:'placeholder' },
  { key:'wings',    label:'Wings / Cape', folder:'', prefix:'', maxItems:0, hidesMesh:null, colors:[], panel:'placeholder' },
];

var SKIN_TONES = [
  {name:'Ivory',     hex:'#FDDBB4'},{name:'Fair',      hex:'#F5C99A'},
  {name:'Light',     hex:'#EAAC84'},{name:'Medium',    hex:'#D4915E'},
  {name:'Tan',       hex:'#C07A47'},{name:'Olive',     hex:'#A8643A'},
  {name:'Brown',     hex:'#8B4513'},{name:'DarkBrown', hex:'#6B3020'},
  {name:'Deep',      hex:'#4A1C0A'},{name:'Ebony',     hex:'#2D0E04'},
  {name:'Caramel',   hex:'#C68642'},{name:'Mocha',     hex:'#795544'},
];
var EYE_COLORS = [
  {name:'Black',hex:'#111111'},{name:'Brown',hex:'#6B3A2A'},
  {name:'Green',hex:'#4A7C59'},{name:'Blue', hex:'#2A5FA5'},
];

/* ══════════════ BUILD UI FIRST — before any Three.js ══════════════
   This guarantees the sidebar is populated even if Three.js fails.  */

var slotState = {};
for (var si = 0; si < SLOT_CONFIG.length; si++) {
  slotState[SLOT_CONFIG[si].key] = { index:0, mesh:null, mat:null, activeColorIdx:0 };
}

function buildSlot(cfg, containerEl) {
  var div = document.createElement('div');
  div.className = 'slot';

  if (cfg.panel === 'placeholder') {
    div.innerHTML =
      '<div class="slot-header">'
        + '<span class="slot-name">' + cfg.label + '</span>'
        + '<span class="slot-badge placeholder">soon</span>'
      + '</div>'
      + '<div class="slot-controls">'
        + '<button class="arrow-btn" disabled>&#8592;</button>'
        + '<span class="slot-label">&#8212; not yet &#8212;</span>'
        + '<button class="arrow-btn" disabled>&#8594;</button>'
      + '</div>';
    containerEl.appendChild(div);
    return;
  }

  var badgeClass = cfg.panel === 'accessory' ? 'accessory' : 'wardrobe';

  // Header
  var hdr = document.createElement('div');
  hdr.className = 'slot-header';
  var nm = document.createElement('span'); nm.className = 'slot-name'; nm.textContent = cfg.label;
  var bg = document.createElement('span'); bg.className = 'slot-badge ' + badgeClass; bg.textContent = cfg.folder + '/';
  hdr.appendChild(nm); hdr.appendChild(bg);
  div.appendChild(hdr);

  // Controls row
  var ctrl = document.createElement('div');
  ctrl.className = 'slot-controls';

  var btnPrev = document.createElement('button');
  btnPrev.className = 'arrow-btn';
  btnPrev.innerHTML = '&#8592;';
  (function(k){ btnPrev.addEventListener('click', function(){ navigateSlot(k, -1); }); })(cfg.key);

  var lbl = document.createElement('span');
  lbl.className = 'slot-label';
  lbl.id = 'label-' + cfg.key;
  lbl.textContent = 'None';

  var btnNext = document.createElement('button');
  btnNext.className = 'arrow-btn';
  btnNext.innerHTML = '&#8594;';
  (function(k){ btnNext.addEventListener('click', function(){ navigateSlot(k, 1); }); })(cfg.key);

  ctrl.appendChild(btnPrev);
  ctrl.appendChild(lbl);
  ctrl.appendChild(btnNext);
  div.appendChild(ctrl);

  // Color picker (free color, e.g. hair)
  if (cfg.colorPicker) {
    var pickerRow = document.createElement('div');
    pickerRow.className = 'slot-picker-row slot-colors';
    var pcl = document.createElement('span'); pcl.className = 'clabel'; pcl.textContent = 'color';
    var picker = document.createElement('input');
    picker.type = 'color';
    picker.value = cfg.colorPickerDefault || '#1a1a1a';
    picker.id = 'picker-' + cfg.key;
    (function(k) {
      picker.addEventListener('input', function() {
        applySlotColor(k, picker.value);
        applyBaseHairColor(picker.value);
      });
    })(cfg.key);
    pickerRow.appendChild(pcl);
    pickerRow.appendChild(picker);
    div.appendChild(pickerRow);
  }

  // Color swatches (preset colors, other slots)
  if (!cfg.colorPicker && cfg.colors && cfg.colors.length > 0) {
    var colorRow = document.createElement('div');
    colorRow.className = 'slot-colors';
    var cl = document.createElement('span'); cl.className = 'clabel'; cl.textContent = 'color';
    colorRow.appendChild(cl);
    for (var ci = 0; ci < cfg.colors.length; ci++) {
      (function(hex, idx, row, key) {
        var sw = document.createElement('button');
        sw.className = 'slot-swatch' + (idx === 0 ? ' active' : '');
        sw.style.background = hex;
        sw.title = hex;
        sw.addEventListener('click', function() {
          var swatches = row.querySelectorAll('.slot-swatch');
          for (var s = 0; s < swatches.length; s++) swatches[s].classList.remove('active');
          sw.classList.add('active');
          slotState[key].activeColorIdx = idx;
          applySlotColor(key, hex);
        });
        row.appendChild(sw);
      })(cfg.colors[ci], ci, colorRow, cfg.key);
    }
    div.appendChild(colorRow);
  }

  containerEl.appendChild(div);
}

// Populate panels immediately
var wardrobeEl    = document.getElementById('wardrobeSlots');
var accessoryEl   = document.getElementById('accessorySlots');
var placeholderEl = document.getElementById('placeholderSlots');

for (var si = 0; si < SLOT_CONFIG.length; si++) {
  var cfg = SLOT_CONFIG[si];
  if (cfg.panel === 'wardrobe')    buildSlot(cfg, wardrobeEl);
  if (cfg.panel === 'accessory')   buildSlot(cfg, accessoryEl);
  if (cfg.panel === 'placeholder') buildSlot(cfg, placeholderEl);
}

// Skin swatches
var skinGrid = document.getElementById('skinSwatches');
var activeSkin = null;
for (var ti = 0; ti < SKIN_TONES.length; ti++) {
  (function(tone, i) {
    var btn = document.createElement('button');
    btn.className = 'swatch' + (i === 2 ? ' active' : '');
    btn.style.background = tone.hex;
    btn.title = tone.name;
    if (i === 2) activeSkin = btn;
    btn.addEventListener('click', function() {
      if (activeSkin) activeSkin.classList.remove('active');
      btn.classList.add('active');
      activeSkin = btn;
      if (matSkin) matSkin.color.set(new THREE.Color(tone.hex));
    });
    skinGrid.appendChild(btn);
  })(SKIN_TONES[ti], ti);
}

// Eye buttons
var eyeGrid = document.getElementById('eyeButtons');
var activeEye = null;
for (var ei = 0; ei < EYE_COLORS.length; ei++) {
  (function(ec, i) {
    var btn = document.createElement('button');
    btn.className = 'eye-btn' + (i === 0 ? ' active' : '');
    if (i === 0) activeEye = btn;
    var dot = document.createElement('span'); dot.className = 'eye-dot'; dot.style.background = ec.hex;
    btn.appendChild(dot);
    btn.appendChild(document.createTextNode(ec.name));
    btn.addEventListener('click', function() {
      if (activeEye) activeEye.classList.remove('active');
      btn.classList.add('active');
      activeEye = btn;
      if (matEyes) matEyes.color.set(new THREE.Color(ec.hex));
    });
    eyeGrid.appendChild(btn);
  })(EYE_COLORS[ei], ei);
}

/* ══════════════ THREE.JS SETUP ══════════════ */
var canvas   = document.getElementById('threeCanvas');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled   = true;
renderer.outputEncoding      = THREE.sRGBEncoding;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

var scene  = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(40, 1, 0.01, 1000);
camera.position.set(0, 1.6, 3.5);

var orbitCtrl = new THREE.OrbitControls(camera, renderer.domElement);
orbitCtrl.enableDamping  = true;
orbitCtrl.dampingFactor  = 0.07;
orbitCtrl.update();

// Lights — explicit, no Object.assign tricks
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

var keyLight = new THREE.DirectionalLight(0xfff8e8, 2.0);
keyLight.position.set(3, 6, 4);
keyLight.castShadow = true;
scene.add(keyLight);

var fillLight = new THREE.DirectionalLight(0x5af0ff, 0.5);
fillLight.position.set(-4, 3, -2);
scene.add(fillLight);

var rimLight = new THREE.DirectionalLight(0xc8ff5a, 0.3);
rimLight.position.set(0, 5, -5);
scene.add(rimLight);

function resize() {
  var el = canvas.parentElement;
  renderer.setSize(el.clientWidth, el.clientHeight, false);
  camera.aspect = el.clientWidth / el.clientHeight;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

(function loop() {
  requestAnimationFrame(loop);
  orbitCtrl.update();
  renderer.render(scene, camera);
})();

/* ══════════════ MATERIAL REFS ══════════════ */
var matSkin     = null;
var matEyes     = null;
var matBaseHair = null;   // shared material for base hair mesh(es) in avatar.glb
var baseMeshes  = {};     // meshKey → THREE.Mesh

/* ══════════════ SAFE MESH FIND ══════════════ */
function findMesh(model, name) {
  if (!name) return null;
  var found = null;
  model.traverse(function(o) {
    if (o.isMesh && o.name === name) found = o;
  });
  return found;
}

/* ══════════════ LOAD BASE AVATAR ══════════════ */
var loader = new THREE.GLTFLoader();

function loadGLB(url, onOK, onFail) {
  loader.load(url,
    function(g) { onOK(g.scene); },
    undefined,
    function(e) { if (onFail) onFail(e); }
  );
}

loadGLB('./avatar.glb', function(model) {
  scene.add(model);

  // Auto-fit camera
  var box    = new THREE.Box3().setFromObject(model);
  var size   = box.getSize(new THREE.Vector3());
  var center = box.getCenter(new THREE.Vector3());
  var maxDim = Math.max(size.x, size.y, size.z);
  camera.position.set(center.x, center.y + size.y * 0.05, center.z + maxDim * 2.2);
  orbitCtrl.target.copy(center);
  orbitCtrl.minDistance   = maxDim * 0.4;
  orbitCtrl.maxDistance   = maxDim * 8;
  orbitCtrl.maxPolarAngle = Math.PI * 0.78;
  orbitCtrl.update();

  // Skin — use a completely fresh material so no texture bleeds through
  matSkin = new THREE.MeshStandardMaterial({ vertexColors: false,
    color: 0xEAAC84,   // default: Light skin tone
    roughness: 0.8,
    metalness: 0.0,
  });
  for (var i = 0; i < MESH_NAMES.skinMeshes.length; i++) {
    var sm = findMesh(model, MESH_NAMES.skinMeshes[i]);
    if (!sm) continue;
    sm.material = matSkin;
    sm.castShadow = true;
  }

  // Eye white — always white, never reassigned again
  var ewMesh = findMesh(model, MESH_NAMES.eyeWhite);
  if (ewMesh) {
    var wm = ewMesh.material.clone();
    wm.color.set(0xffffff);
    ewMesh.material = wm;
  }

  // Eye iris — fresh material, default dark
  var eiMesh = findMesh(model, MESH_NAMES.eyeIris);
  if (eiMesh) {
    matEyes = new THREE.MeshStandardMaterial({ vertexColors: false,
      color: 0x111111,
      roughness: 0.5,
      metalness: 0.0,
    });
    eiMesh.material = matEyes;
  }

  // Base clothing refs
  var baseKeys = ['basePants', 'baseShoes', 'baseHoodie'];
  for (var b = 0; b < baseKeys.length; b++) {
    var bm = findMesh(model, MESH_NAMES[baseKeys[b]]);
    if (bm) baseMeshes[baseKeys[b]] = bm;
  }

  // Base hair meshes — fresh material, apply picker default
  matBaseHair = null;
  var hairDefault = '#1a1a1a';
  var hairPickerEl = document.getElementById('picker-hair');
  if (hairPickerEl) hairDefault = hairPickerEl.value;
  var hairMatCreated = false;
  for (var h = 0; h < MESH_NAMES.hairMeshes.length; h++) {
    var hm = findMesh(model, MESH_NAMES.hairMeshes[h]);
    if (!hm) continue;
    if (!hairMatCreated) {
      matBaseHair = new THREE.MeshStandardMaterial({ vertexColors: false,
        color: new THREE.Color(hairDefault),
        roughness: 0.8,
        metalness: 0.0,
      });
      hairMatCreated = true;
    }
    hm.material = matBaseHair;
    hm.castShadow = true;
  }

  document.getElementById('loadingOverlay').style.display = 'none';

}, function(err) {
  document.getElementById('loadingOverlay').style.display = 'none';
  console.error('Failed to load avatar.glb:', err);
});

/* ══════════════ BASE MESH VISIBILITY ══════════════ */
function updateBaseMeshVisibility(meshKey) {
  var mesh = baseMeshes[meshKey];
  if (!mesh) return;
  var hidden = false;
  for (var i = 0; i < SLOT_CONFIG.length; i++) {
    if (SLOT_CONFIG[i].hidesMesh === meshKey && slotState[SLOT_CONFIG[i].key].index > 0) {
      hidden = true;
      break;
    }
  }
  mesh.visible = !hidden;
}

/* ══════════════ SLOT FUNCTIONS ══════════════ */
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function setLabel(key, text, state) {
  var el = document.getElementById('label-' + key);
  if (!el) return;
  el.textContent = text;
  el.className = 'slot-label' + (state ? ' ' + state : '');
}

function clearSlotMesh(key) {
  var st = slotState[key];
  if (st.mesh) { scene.remove(st.mesh); st.mesh = null; st.mat = null; }
}

function applySlotColor(key, hex) {
  var st = slotState[key];
  if (st.mat) st.mat.color.set(new THREE.Color(hex));
}

// Updates base hair mesh color in avatar.glb
function applyBaseHairColor(hex) {
  if (matBaseHair) matBaseHair.color.set(new THREE.Color(hex));
}

function getCfg(key) {
  for (var i = 0; i < SLOT_CONFIG.length; i++) {
    if (SLOT_CONFIG[i].key === key) return SLOT_CONFIG[i];
  }
  return null;
}

function applySlot(key, idx) {
  var cfg = getCfg(key);
  if (!cfg) return;
  var st = slotState[key];

  clearSlotMesh(key);
  st.index = idx;
  if (cfg.hidesMesh) updateBaseMeshVisibility(cfg.hidesMesh);
  if (idx === 0) { setLabel(key, 'None'); return; }

  var url = './' + cfg.folder + '/' + cfg.prefix + '_' + pad2(idx) + '.glb';
  setLabel(key, pad2(idx) + '.glb', 'loading');

  loadGLB(url, function(model) {
    st.mat = null;
    model.traverse(function(o) {
      if (!o.isMesh) return;
      o.castShadow = true;
      o.receiveShadow = true;
      if (!st.mat) {
        // Fresh material — no texture, pure color so presets show accurately
        var cfg2 = getCfg(key);
        var startColor = '#ffffff';
        if (cfg2 && cfg2.colorPicker) {
          var pickerEl = document.getElementById('picker-' + key);
          if (pickerEl) startColor = pickerEl.value;
        } else if (cfg2 && cfg2.colors && cfg2.colors.length > 0) {
          startColor = cfg2.colors[st.activeColorIdx];
        }
        st.mat = new THREE.MeshStandardMaterial({ vertexColors: false,
          color: new THREE.Color(startColor),
          roughness: 0.8,
          metalness: 0.0,
        });
      }
      o.material = st.mat;
    });
    scene.add(model);
    st.mesh = model;
    setLabel(key, cfg.prefix + '_' + pad2(idx) + '.glb');
  }, function() {
    st.index = Math.max(0, idx - 1);
    if (cfg.hidesMesh) updateBaseMeshVisibility(cfg.hidesMesh);
    setLabel(key, 'Not found', 'error');
    setTimeout(function() {
      setLabel(key, st.index === 0 ? 'None' : cfg.prefix + '_' + pad2(st.index) + '.glb');
    }, 1400);
  });
}

function navigateSlot(key, delta) {
  var cfg = getCfg(key);
  if (!cfg) return;
  var st  = slotState[key];
  var next = st.index + delta;
  if (next < 0) next = 0;
  if (next > cfg.maxItems) next = 0;
  applySlot(key, next);
}

</script>
